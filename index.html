<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Voorraad</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #e2ddd6;
    --text: #1a1814;
    --text2: #7a7570;
    --accent: #2d6a4f;
    --accent2: #40916c;
    --accent-light: #d8f3dc;
    --warn: #e07a5f;
    --warn-light: #fdf0ed;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    background: var(--accent);
    color: white;
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header-sub {
    font-size: 12px;
    opacity: 0.75;
    font-family: 'DM Mono', monospace;
  }
  .sync-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .sync-btn:active { opacity: 0.7; }

  /* Search */
  .search-wrap {
    padding: 0 20px 0;
    background: var(--accent);
    padding-bottom: 14px;
  }
  .search-input {
    width: 100%;
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.9);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    outline: none;
  }
  .search-input::placeholder { color: var(--text2); }

  /* Nav tabs */
  .nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav-tab {
    flex: none;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .nav-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Content */
  .content { padding: 16px 20px; }

  /* Stats bar */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num {
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }

  /* Section */
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 16px 0 8px;
  }

  /* Product list */
  .product-list { display: flex; flex-direction: column; gap: 6px; }

  .product-item {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.15s;
    border-left: 3px solid transparent;
  }
  .product-item:active { transform: scale(0.98); }
  .product-item.expired { border-left-color: var(--warn); background: var(--warn-light); }
  .product-item.expiring-soon { border-left-color: #f4a261; }

  .product-photo {
    width: 42px;
    height: 42px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .product-info { flex: 1; min-width: 0; }
  .product-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .product-meta {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .product-meta span { display: flex; align-items: center; gap: 3px; }
  .product-qty {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    flex-shrink: 0;
    background: var(--accent-light);
    padding: 4px 8px;
    border-radius: 8px;
  }

  /* Group cards */
  .group-list { display: flex; flex-direction: column; gap: 8px; }
  .group-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .group-header {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    font-weight: 500;
    font-size: 14px;
  }
  .group-header:active { background: var(--surface2); }
  .group-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 10px;
  }
  .group-items { display: none; border-top: 1px solid var(--border); }
  .group-items.open { display: block; }
  .group-item {
    padding: 10px 14px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .group-item:last-child { border-bottom: none; }
  .group-item:active { background: var(--surface2); }
  .group-item-name { flex: 1; }
  .group-item-right { display: flex; gap: 8px; align-items: center; }
  .group-item-loc { font-size: 11px; color: var(--text2); }
  .group-item-qty {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }

  /* Mic button */
  .mic-section {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
  }
  .mic-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(45,106,79,0.4);
  }
  .mic-btn.recording {
    background: var(--warn);
    animation: pulse 1s infinite;
    box-shadow: 0 4px 14px rgba(224,122,95,0.4);
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .mic-status {
    flex: 1;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.4;
  }
  .mic-status.response {
    color: var(--text);
    font-weight: 500;
  }

  /* Detail modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .modal-cat { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
  .modal-field {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .modal-field:last-of-type { border-bottom: none; }
  .modal-field-label { color: var(--text2); font-size: 13px; }
  .modal-field-value { font-weight: 500; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .modal-btn.primary { background: var(--accent); color: white; }
  .modal-btn.secondary { background: var(--surface2); color: var(--text); }
  .modal-btn.danger { background: var(--warn-light); color: var(--warn); }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    font-size: 22px;
    color: var(--text2);
    cursor: pointer;
  }

  /* Vervaldatums */
  .expiry-badge {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 6px;
    font-weight: 500;
  }
  .expiry-badge.expired { background: var(--warn-light); color: var(--warn); }
  .expiry-badge.soon { background: #fff3e0; color: #e07a5f; }
  .expiry-badge.ok { background: var(--accent-light); color: var(--accent); }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
    font-size: 14px;
  }
  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 300;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Settings */
  .settings-panel {
    display: none;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .settings-panel.open { display: block; }
  .settings-field { margin-bottom: 12px; }
  .settings-field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .settings-field input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  .settings-save {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  .empty { text-align: center; padding: 30px; color: var(--text2); font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>🏪 Mijn Voorraad</h1>
      <div class="header-sub" id="last-sync">Nooit gesynchroniseerd</div>
    </div>
    <button class="sync-btn" onclick="loadData()">↻ Sync</button>
  </div>
  <div class="search-wrap" style="padding:0;">
    <input class="search-input" id="search" placeholder="🔍 Zoek product..." oninput="onSearch(this.value)">
  </div>
</div>

<div class="nav">
  <button class="nav-tab active" onclick="showTab('overzicht')">Overzicht</button>
  <button class="nav-tab" onclick="showTab('locatie')">Per locatie</button>
  <button class="nav-tab" onclick="showTab('categorie')">Per categorie</button>
  <button class="nav-tab" onclick="showTab('vervaldatum')">Vervaldatums</button>
  <button class="nav-tab" onclick="showTab('instellingen')">⚙</button>
</div>

<div class="content" id="content">
  <div class="loading">
    <div class="loading-spinner"></div>
    Voorraad laden...
  </div>
</div>

<!-- Mic -->
<div class="mic-section">
  <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
  <div class="mic-status" id="mic-status">Tik op de microfoon om in te spreken</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVeDtVUI1BLT-iW0yZUanH9iAC4z6ZSOV_UEODTeYwA5KewpP0CmzeB-WaXURRyv3P/exec';
const ANTHROPIC_KEY_STORAGE = 'voorraad_api_key';

let allData = [];
let currentTab = 'overzicht';
let isRecording = false;
let recognition = null;
let gesprekHistory = [];
let huidigProduct = null;

// Settings
function getSettings() {
  return {
    apiKey: localStorage.getItem(ANTHROPIC_KEY_STORAGE) || ''
  };
}

// Load data from Google Sheets
async function loadData() {
  try {
    document.getElementById('content').innerHTML = '<div class="loading"><div class="loading-spinner"></div>Laden...</div>';
    const resp = await fetch(SCRIPT_URL + '?action=read');
    const data = await resp.json();
    if (data.rows) {
      allData = data.rows;
      localStorage.setItem('voorraad_cache', JSON.stringify(allData));
      localStorage.setItem('voorraad_sync', new Date().toLocaleString('nl-NL'));
      document.getElementById('last-sync').textContent = 'Gesync: ' + new Date().toLocaleTimeString('nl-NL', {hour:'2-digit',minute:'2-digit'});
      renderTab();
      showToast('✓ Voorraad bijgewerkt');
    }
  } catch(e) {
    const cached = localStorage.getItem('voorraad_cache');
    if (cached) {
      allData = JSON.parse(cached);
      const syncTime = localStorage.getItem('voorraad_sync') || 'onbekend';
      document.getElementById('last-sync').textContent = '📴 Offline — ' + syncTime;
      renderTab();
      showToast('Offline modus — gecachede data');
    } else {
      document.getElementById('content').innerHTML = '<div class="empty">Geen data. Controleer je verbinding.</div>';
    }
  }
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach((t,i) => {
    t.classList.toggle('active', ['overzicht','locatie','categorie','vervaldatum','instellingen'][i] === tab);
  });
  document.getElementById('search').value = '';
  renderTab();
}

function renderTab(data) {
  const rows = data || allData;
  const el = document.getElementById('content');

  if (currentTab === 'instellingen') { renderSettings(); return; }
  if (rows.length === 0 && currentTab !== 'instellingen') {
    el.innerHTML = '<div class="empty">Geen producten gevonden</div>'; return;
  }

  if (currentTab === 'overzicht') renderOverzicht(rows, el);
  else if (currentTab === 'locatie') renderGroepen(rows, el, 'Opslagplaats');
  else if (currentTab === 'categorie') renderGroepen(rows, el, 'Categorieën');
  else if (currentTab === 'vervaldatum') renderVervaldatums(rows, el);
}

function renderOverzicht(rows, el) {
  const expired = rows.filter(r => isExpired(r.Vervaldatum)).length;
  const soon = rows.filter(r => isExpiringSoon(r.Vervaldatum)).length;
  const locs = new Set(rows.map(r => r.Opslagplaats).filter(Boolean)).size;

  let html = `<div class="stats" style="grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px">
    <div class="stat-card" style="padding:8px 12px"><div class="stat-num" style="font-size:18px">${rows.length}</div><div class="stat-label">Producten</div></div>
    <div class="stat-card" style="padding:8px 12px"><div class="stat-num" style="font-size:18px">${locs}</div><div class="stat-label">Locaties</div></div>
  </div>`;

  if (expired > 0 || soon > 0) {
    html += `<div class="section-title">⚠️ Aandacht nodig</div><div class="product-list">`;
    rows.filter(r => isExpired(r.Vervaldatum) || isExpiringSoon(r.Vervaldatum))
      .slice(0,5).forEach(r => { html += productItemHTML(r); });
    html += `</div>`;
  }

  html += `<div class="section-title">Alle producten</div><div class="product-list">`;
  rows.forEach(r => { html += productItemHTML(r); });
  html += `</div>`;
  el.innerHTML = html;
}

function renderGroepen(rows, el, key) {
  const groups = {};
  rows.forEach(r => {
    const k = r[key] || '—';
    if (!groups[k]) groups[k] = [];
    groups[k].push(r);
  });

  let html = `<div class="group-list">`;
  Object.keys(groups).sort().forEach(g => {
    const items = groups[g];
    const totalQty = items.reduce((s,r) => s + (parseFloat(r.Aantal)||0), 0);
    html += `<div class="group-card">
      <div class="group-header" onclick="toggleGroup(this)">
        <span>${g}</span>
        <span class="group-count">${items.length} × ${totalQty % 1 === 0 ? totalQty : totalQty.toFixed(1)}</span>
      </div>
      <div class="group-items">`;
    items.forEach(r => {
      const exp = expiryBadge(r.Vervaldatum);
      html += `<div class="group-item" onclick="openModal(${JSON.stringify(r).replace(/"/g,'&quot;')})">
        <span class="group-item-name">${r.Productnaam}</span>
        <span class="group-item-right">
          ${exp}
          <span class="group-item-loc">${key === 'Opslagplaats' ? r['Categorieën'] : r.Opslagplaats}</span>
          <span class="group-item-qty">${r.Aantal}</span>
        </span>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

function renderVervaldatums(rows, el) {
  const expired = rows.filter(r => r.Vervaldatum && isExpired(r.Vervaldatum));
  const soon = rows.filter(r => r.Vervaldatum && isExpiringSoon(r.Vervaldatum) && !isExpired(r.Vervaldatum));
  const ok = rows.filter(r => r.Vervaldatum && !isExpired(r.Vervaldatum) && !isExpiringSoon(r.Vervaldatum));
  const none = rows.filter(r => !r.Vervaldatum);

  let html = '';
  if (expired.length) {
    html += `<div class="section-title">🔴 Verlopen (${expired.length})</div><div class="product-list">`;
    expired.forEach(r => { html += productItemHTML(r); });
    html += `</div>`;
  }
  if (soon.length) {
    html += `<div class="section-title">🟡 Binnenkort (${soon.length})</div><div class="product-list">`;
    soon.forEach(r => { html += productItemHTML(r); });
    html += `</div>`;
  }
  if (ok.length) {
    html += `<div class="section-title">🟢 OK (${ok.length})</div><div class="product-list">`;
    ok.forEach(r => { html += productItemHTML(r); });
    html += `</div>`;
  }
  if (none.length) {
    html += `<div class="section-title">Geen datum (${none.length})</div><div class="product-list">`;
    none.forEach(r => { html += productItemHTML(r); });
    html += `</div>`;
  }
  el.innerHTML = html;
}

function renderSettings() {
  const s = getSettings();
  document.getElementById('content').innerHTML = `
    <div class="section-title">Instellingen</div>
    <div class="settings-panel open">
      <div class="settings-field">
        <label>Anthropic API key</label>
        <input type="password" id="set-apikey" value="${s.apiKey}" placeholder="sk-ant-...">
      </div>
      <button class="settings-save" onclick="saveSettings()">Opslaan</button>
    </div>
    <div class="section-title">Over deze app</div>
    <div class="stat-card" style="text-align:left;padding:14px;margin-top:8px;font-size:13px;color:var(--text2);line-height:1.6">
      Versie 1.0 · Verbonden met Google Sheets<br>
      Data: ${allData.length} producten geladen<br>
      Cache: ${localStorage.getItem('voorraad_sync') || 'nog niet gesynchroniseerd'}
    </div>
  `;
}

function saveSettings() {
  localStorage.setItem(ANTHROPIC_KEY_STORAGE, document.getElementById('set-apikey').value);
  showToast('✓ Instellingen opgeslagen');
}

function productItemHTML(r) {
  const cls = isExpired(r.Vervaldatum) ? 'expired' : isExpiringSoon(r.Vervaldatum) ? 'expiring-soon' : '';
  const emoji = categoryEmoji(r['Categorieën']);
  return `<div class="product-item ${cls}" onclick='openModal(${JSON.stringify(r)})'>
    <div class="product-photo">${r.Foto ? `<img src="${r.Foto}" style="width:100%;height:100%;border-radius:8px;object-fit:cover">` : emoji}</div>
    <div class="product-info">
      <div class="product-name">${r.Productnaam}</div>
      <div class="product-meta">
        <span>📍 ${r.Opslagplaats || '—'}</span>
        ${r.Vervaldatum ? `<span>📅 ${formatDate(r.Vervaldatum)}</span>` : ''}
        ${r.Comment ? `<span style="color:var(--text2)">${String(r.Comment).substring(0,30)}${String(r.Comment).length>30?'…':''}</span>` : ''}
      </div>
    </div>
    <div class="product-qty">${r.Aantal || 1}</div>
  </div>`;
}

function categoryEmoji(cat) {
  if (!cat) return '📦';
  cat = cat.toLowerCase();
  if (cat.includes('kruid') || cat.includes('spece')) return '🌿';
  if (cat.includes('meel') || cat.includes('melen')) return '🌾';
  if (cat.includes('zoet') || cat.includes('suiker')) return '🍯';
  if (cat.includes('chocol') || cat.includes('cacao')) return '🍫';
  if (cat.includes('noot') || cat.includes('zaad') || cat.includes('pit')) return '🌰';
  if (cat.includes('olie') || cat.includes('vet')) return '🫙';
  if (cat.includes('vitamine') || cat.includes('supplement')) return '💊';
  if (cat.includes('peulvrucht')) return '🫘';
  if (cat.includes('graan')) return '🍚';
  if (cat.includes('drank') || cat.includes('drinken')) return '🥤';
  if (cat.includes('hulp')) return '🧪';
  return '📦';
}

function openModal(r) {
  if (typeof r === 'string') r = JSON.parse(r);
  const exp = expiryBadge(r.Vervaldatum);
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">${r.Productnaam}</div>
    <div class="modal-cat">${r['Categorieën'] || ''}</div>
    ${r.Foto ? `<img src="${r.Foto}" style="width:100%;height:160px;object-fit:cover;border-radius:10px;margin-bottom:12px">` : ''}
    <div class="modal-field"><span class="modal-field-label">Locatie</span><span class="modal-field-value">📍 ${r.Opslagplaats || '—'}</span></div>
    <div class="modal-field"><span class="modal-field-label">Aantal</span><span class="modal-field-value">${r.Aantal || 1}</span></div>
    <div class="modal-field"><span class="modal-field-label">Vervaldatum</span><span class="modal-field-value">${r.Vervaldatum ? formatDate(r.Vervaldatum) + ' ' + exp : '—'}</span></div>
    ${r.Comment ? `<div class="modal-field"><span class="modal-field-label">Notitie</span><span class="modal-field-value" style="font-size:13px;text-align:right;max-width:60%">${r.Comment}</span></div>` : ''}
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal()">Sluiten</button>
      <button class="modal-btn primary" onclick="quickUpdate(${JSON.stringify(r).replace(/"/g,'&quot;')})">Bijwerken</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function quickUpdate(r) {
  const nieuw = prompt(`Nieuw aantal voor "${r.Productnaam}" (nu: ${r.Aantal}):`);
  if (nieuw === null) return;
  updateProduct(r, {Aantal: parseFloat(nieuw)});
}

async function updateProduct(r, changes) {
  try {
    const payload = Object.assign({action:'update', Productnaam: r.Productnaam, Opslagplaats: r.Opslagplaats}, changes);
    await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body: JSON.stringify(payload)});
    const idx = allData.findIndex(x => x.Productnaam === r.Productnaam && x.Opslagplaats === r.Opslagplaats);
    if (idx >= 0) Object.assign(allData[idx], changes);
    if (changes.Opslagplaats_nieuw) allData[idx].Opslagplaats = changes.Opslagplaats_nieuw;
    localStorage.setItem('voorraad_cache', JSON.stringify(allData));
    closeModal();
    renderTab();
    showToast('✓ Bijgewerkt');
  } catch(e) { showToast('Fout bij opslaan'); }
}

// Haal getal (in grammen/ml/stuks) op uit Comment-veld
// Geeft { waarde: 300, eenheid: 'gr', rest: '' } of null als geen getal gevonden
function parseHoeveelheid(comment) {
  if (!comment) return null;
  // Zoek patroon zoals "300 gr", "1000gr", "500 ml", "2 stuks", "1 kg" etc.
  const match = comment.match(/^(\d+(?:[.,]\d+)?)\s*(gr|gram|kg|ml|l|stuks?|potten?|zakken?|blikken?|pakken?)?(.*)$/i);
  if (!match) return null;
  let waarde = parseFloat(match[1].replace(',', '.'));
  let eenheid = (match[2] || 'stuks').toLowerCase();
  let rest = (match[3] || '').trim();
  // Converteer kg naar gr, l naar ml
  if (eenheid === 'kg') { waarde = waarde * 1000; eenheid = 'gr'; }
  if (eenheid === 'l') { waarde = waarde * 1000; eenheid = 'ml'; }
  return { waarde, eenheid, rest };
}

// Maak nieuwe comment-string op basis van nieuwe waarde
function maakNieuweComment(oudComment, nieuweWaarde, eenheid) {
  if (nieuweWaarde <= 0) return '0 ' + eenheid;
  return Math.round(nieuweWaarde) + ' ' + eenheid;
}

async function verplaatsHoeveelheid(productnaam, vanLocatie, naarLocatie, hoeveelheid, doelLeeg) {
  console.log('verplaats aangeroepen:', productnaam, vanLocatie, naarLocatie, hoeveelheid, doelLeeg);
  try {
    // Zoek bronproduct
    const bron = allData.find(r =>
      r.Productnaam.toLowerCase().includes(productnaam.toLowerCase()) &&
      r.Opslagplaats.toLowerCase().includes(vanLocatie.toLowerCase())
    );
    console.log('bron gevonden:', bron ? bron.Productnaam + ' @ ' + bron.Opslagplaats : 'NIET GEVONDEN');
    if (!bron) { showToast('Bronproduct niet gevonden'); return; }

    // Haal hoeveelheid op uit Comment van bron
    const bronParsed = parseHoeveelheid(bron.Comment);
    console.log('bron comment:', bron.Comment, 'parsed:', JSON.stringify(bronParsed));
    const eenheid = bronParsed ? bronParsed.eenheid : 'gr';
    const bronWaarde = bronParsed ? bronParsed.waarde : 0;
    const nieuweBronWaarde = Math.max(0, bronWaarde - hoeveelheid);
    const nieuweBronComment = maakNieuweComment(bron.Comment, nieuweBronWaarde, eenheid);
    console.log('nieuw bron comment:', nieuweBronComment);
    console.log('fetch bron versturen...');

    // Update bron: Comment aanpassen, Aantal blijft hetzelfde
    await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({
      action:'update',
      Productnaam: bron.Productnaam,
      Opslagplaats: bron.Opslagplaats,
      Aantal: bron.Aantal,
      Comment: nieuweBronComment
    })});
    const bronIdx = allData.findIndex(x => x.Productnaam === bron.Productnaam && x.Opslagplaats === bron.Opslagplaats);
    if (bronIdx >= 0) allData[bronIdx].Comment = nieuweBronComment;

    // Zoek doelproduct
    const doel = allData.find(r =>
      r.Productnaam.toLowerCase().includes(productnaam.toLowerCase()) &&
      r.Opslagplaats.toLowerCase().includes(naarLocatie.toLowerCase())
    );

    if (doel) {
      // Doellocatie bestaat al: hoeveelheid optellen tenzij doel_leeg=true (dan vanaf 0 beginnen)
      const doelParsed = parseHoeveelheid(doel.Comment);
      const doelHuidig = doelLeeg ? 0 : (doelParsed ? doelParsed.waarde : 0);
      const nieuweDoelWaarde = doelHuidig + hoeveelheid;
      const nieuweDoelComment = maakNieuweComment(doel.Comment, nieuweDoelWaarde, eenheid);

      await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({
        action:'update',
        Productnaam: doel.Productnaam,
        Opslagplaats: doel.Opslagplaats,
        Aantal: doel.Aantal,
        Comment: nieuweDoelComment
      })});
      const doelIdx = allData.findIndex(x => x.Productnaam === doel.Productnaam && x.Opslagplaats === doel.Opslagplaats);
      if (doelIdx >= 0) allData[doelIdx].Comment = nieuweDoelComment;
    } else {
      // Doellocatie bestaat nog niet: nieuwe rij aanmaken
      const nieuweComment = Math.round(hoeveelheid) + ' ' + eenheid;
      await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({
        action:'add',
        Productnaam: bron.Productnaam,
        Opslagplaats: naarLocatie,
        Categorieën: bron['Categorieën'],
        Aantal: bron.Aantal,
        Comment: nieuweComment,
        Vervaldatum: bron.Vervaldatum || ''
      })});
    }

    localStorage.setItem('voorraad_cache', JSON.stringify(allData));
    await loadData();
    showToast('✓ ' + Math.round(hoeveelheid) + ' ' + eenheid + ' verplaatst naar ' + naarLocatie);
  } catch(e) {
    showToast('Fout bij verplaatsen: ' + e.message);
    console.error(e);
  }
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

function toggleGroup(el) {
  el.nextElementSibling.classList.toggle('open');
}

function onSearch(q) {
  if (!q) { renderTab(); return; }
  q = q.toLowerCase();
  const filtered = allData.filter(r =>
    (r.Productnaam||'').toLowerCase().includes(q) ||
    (r.Opslagplaats||'').toLowerCase().includes(q) ||
    (r['Categorieën']||'').toLowerCase().includes(q) ||
    String(r.Comment||'').toLowerCase().includes(q)
  );
  renderTab(filtered);
}

// Date helpers
function parseDate(s) {
  if (!s) return null;
  const parts = s.toString().split('-');
  if (parts.length === 3) return new Date(parts[2], parts[1]-1, parts[0]);
  return null;
}
function formatDate(s) {
  const d = parseDate(s);
  if (!d) return s;
  return d.toLocaleDateString('nl-NL', {day:'numeric',month:'short',year:'numeric'});
}
function isExpired(s) {
  const d = parseDate(s); if (!d) return false;
  return d < new Date();
}
function isExpiringSoon(s) {
  const d = parseDate(s); if (!d) return false;
  const soon = new Date(); soon.setDate(soon.getDate() + 60);
  return d < soon && d >= new Date();
}
function expiryBadge(s) {
  if (!s) return '';
  if (isExpired(s)) return `<span class="expiry-badge expired">Verlopen</span>`;
  if (isExpiringSoon(s)) return `<span class="expiry-badge soon">Binnenkort</span>`;
  return `<span class="expiry-badge ok">OK</span>`;
}

// Voice
function toggleMic() {
  if (isRecording) { stopMic(); return; }
  startMic();
}

function startMic() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { showToast('Spraak niet ondersteund in deze browser'); return; }
  recognition = new SpeechRecognition();
  recognition.lang = 'nl-NL';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-status').textContent = '🎤 Luisteren...';
  };

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('mic-status').textContent = '"' + transcript + '"';
    stopMic();
    processVoice(transcript);
  };

  recognition.onerror = (e) => {
    if (e.error !== 'no-speech') { stopMic(); showToast('Spraak niet herkend: ' + e.error); }
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
  };
  recognition.start();
}

function stopMic() {
  if (recognition) recognition.stop();
  isRecording = false;
  document.getElementById('mic-btn').classList.remove('recording');
}

async function processVoice(transcript) {
  const apiKey = getSettings().apiKey;
  if (!apiKey) { showToast('Stel eerst je API key in via ⚙ Instellingen'); return; }

  // "Stop" wist de context en begint fris
  if (transcript.trim().toLowerCase() === 'stop') {
    gesprekHistory = [];
    huidigProduct = null;
    document.getElementById('mic-status').textContent = 'Context gewist. Nieuw product?';
    document.getElementById('search').value = '';
    renderTab();
    return;
  }

  document.getElementById('mic-status').textContent = '⏳ Verwerken...';

  gesprekHistory.push({role: 'user', content: transcript});
  if (gesprekHistory.length > 8) gesprekHistory = gesprekHistory.slice(-8);

  const woorden = transcript.toLowerCase().split(' ').filter(w => w.length > 2);
  const gevonden = allData.filter(r => {
    const tekst = (r.Productnaam + ' ' + r.Opslagplaats + ' ' + r['Categorieën']).toLowerCase();
    return woorden.some(w => tekst.includes(w));
  });
  const contextData = gevonden.length > 0 ? gevonden : allData.slice(0, 100);
  const context = contextData.map(r =>
    `${r.Productnaam} | ${r.Opslagplaats} | ${r['Categorieën']} | aantal: ${r.Aantal} | hoeveelheid: ${r.Comment||'onbekend'} | vervalt: ${r.Vervaldatum||'onbekend'}`
  ).join('\n');

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [
          ...gesprekHistory.slice(0, -1).map(function(m) {
            return {
              role: m.role,
              content: m.role === 'user' ? 'Gebruiker zei eerder: "' + m.content + '"' : m.content
            };
          }),
          {
            role: 'user',
            content: `Je bent een voorraadassistent. Gebruik de gespreksgeschiedenis voor context.

${huidigProduct ? 'Huidig product in gesprek: ' + huidigProduct + '\n' : ''}
Gebruiker zei: "${transcript}"

Relevante producten (productnaam | locatie | categorie | aantal verpakkingen | hoeveelheid in comment | vervaldatum):
${context}

BELANGRIJK voor "is op" / "leeg":
- Als iets "op is" of "leeg is": actie "update", aantal: 0 — NOOIT actie "delete"
- "delete" alleen bij expliciet "verwijder uit de voorraad"

BELANGRIJK voor verplaatsen:
- "hoeveelheid" is altijd een getal in grammen, ml of stuks (bijv. 300 voor "300 gram")
- "doel_leeg" is true als de gebruiker aangeeft dat de doellocatie leeg/op is
- Bij verplaatsen wordt de hoeveelheid AFGETROKKEN van de bronlocatie (via Comment-veld)
- Bij verplaatsen wordt de hoeveelheid OPGETELD bij de doellocatie (tenzij doel_leeg=true, dan vanaf 0)
- Aantal verpakkingen (Aantal-veld) wordt NIET aangepast bij verplaatsen

Geef een JSON antwoord:
{
  "actie": "update|add|delete|zoek|info|verplaats",
  "product": "productnaam",
  "locatie": "bronlocatie of null",
  "locatie_nieuw": "doellocatie of null",
  "aantal": null,
  "hoeveelheid": null,
  "doel_leeg": false,
  "vervaldatum": null,
  "antwoord": "kort Nederlands antwoord",
  "uitvoeren": true
}
Geef ALLEEN geldige JSON, geen tekst eromheen.`
          }
        ]
      })
    });

    const d = await resp.json();
    if (!d.content || !d.content[0]) {
      throw new Error('API fout: ' + JSON.stringify(d).substring(0, 100));
    }
    const text = d.content[0].text.replace(/```json|```/g,'').trim();
    const result = JSON.parse(text);

    if (result.product) huidigProduct = result.product;
    gesprekHistory.push({role: 'assistant', content: result.antwoord});
    if (gesprekHistory.length > 8) gesprekHistory = gesprekHistory.slice(-8);

    let antwoord = result.antwoord;
    if (result.product) {
      const matches = allData.filter(r => r.Productnaam.toLowerCase().includes(result.product.toLowerCase()));
      if (matches.length > 0 && (result.actie === 'zoek' || result.actie === 'info')) {
        antwoord = matches.length === 1
          ? matches[0].Productnaam + ' — ' + matches[0].Opslagplaats
          : matches.length + ' resultaten gevonden voor ' + result.product;
      } else if (matches.length > 0) {
        const details = matches.map(r => r.Opslagplaats + ': ' + r.Aantal + (r.Comment ? ' (' + r.Comment + ')' : '')).join(' | ');
        antwoord += ' — ' + details;
      }
    }

    const statusEl = document.getElementById('mic-status');
    statusEl.textContent = antwoord;
    statusEl.classList.add('response');

    setTimeout(() => {
      statusEl.classList.remove('response');
      startMic();
    }, 4000);

    // Context wordt NIET automatisch gewist na een actie.
    // Zeg "stop" om de context te wissen en een nieuw product te beginnen.

    console.log('AI resultaat:', JSON.stringify(result));
    if (result.uitvoeren) {
      if (result.actie === 'update') {
        const product = allData.find(r => {
          const naamMatch = r.Productnaam.toLowerCase().includes(result.product.toLowerCase());
          if (result.locatie) {
            return naamMatch && r.Opslagplaats.toLowerCase().includes(result.locatie.toLowerCase());
          }
          return naamMatch;
        });
        if (product) {
          const changes = {};
          if (result.aantal !== null) changes.Aantal = result.aantal;
          if (result.aantal === 0) changes.Comment = '0 gr';
          if (result.locatie_nieuw) changes.Opslagplaats_nieuw = result.locatie_nieuw;
          if (result.vervaldatum) changes.Vervaldatum = result.vervaldatum;
          await updateProduct(product, changes);
        } else {
          showToast('Product niet gevonden: ' + result.product);
        }
      } else if (result.actie === 'add') {
        await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({
          action:'add',
          Productnaam: result.product,
          Opslagplaats: result.locatie || '',
          Aantal: result.aantal || 1,
          Vervaldatum: result.vervaldatum || ''
        })});
        await loadData();
      } else if (result.actie === 'delete') {
        const product = allData.find(r => r.Productnaam.toLowerCase().includes(result.product.toLowerCase()));
        if (product) {
          await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', body: JSON.stringify({action:'delete', Productnaam: product.Productnaam, Opslagplaats: product.Opslagplaats})});
          await loadData();
        }
      } else if (result.actie === 'verplaats') {
        if (result.hoeveelheid && result.locatie && result.locatie_nieuw) {
          await verplaatsHoeveelheid(result.product, result.locatie, result.locatie_nieuw, result.hoeveelheid, result.doel_leeg);
        } else if (result.locatie_nieuw) {
          const product = allData.find(r => r.Productnaam.toLowerCase().includes(result.product.toLowerCase()));
          if (product) await updateProduct(product, {Opslagplaats_nieuw: result.locatie_nieuw});
        }
      }
    }

    if (result.product) {
      document.getElementById('search').value = result.product;
      onSearch(result.product);
    }

  } catch(e) {
    document.getElementById('mic-status').textContent = 'Fout: ' + e.message;
    console.error('Verwerkingsfout:', e);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
loadData();
</script>
