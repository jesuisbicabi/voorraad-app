    save(); renderMain(); return true;
  });
}

// ═══════════════════════════════════════════════════════
// TASK MODAL  (#6 volgorde, #7 mappad, #9 dep-filter, #10 sjablonen)
// ═══════════════════════════════════════════════════════
function openNewTask() {
  const proj = getProj(st.catId,st.projId); if (!proj) return;
  const maxPos = proj.tasks.reduce((m,t) => Math.max(m,t.position),-1);
  const task = {
    id:uid(),title:'',description:'',deadline:null,
    links:[],outlookLink:'',folderPath:'',
    logEntries:[],outcome:'',status:'actief',
    position:maxPos+1,successors:[],requiredTasks:[],chosenSuccessorId:null,
    subtasks:[],isExpanded:false,templateId:null,templateOverrides:{},pinned:false
  };
  openTaskModal(task,proj,true,null);
}

function openEditTask(tid) {
  const proj = getProj(st.catId,st.projId); if (!proj) return;
  const task = getTask(proj,tid); if (!task) return;
  openTaskModal(task,proj,false,null);
}

// (#8) Subtask modals
function openNewSubtask(parentId) {
  const proj = getProj(st.catId,st.projId); if (!proj) return;
  const parent = getTask(proj,parentId); if (!parent) return;
  if (!parent.subtasks) parent.subtasks = [];
  const maxPos = parent.subtasks.reduce((m,s) => Math.max(m,s.position),-1);
  const sub = {
    id:uid(),title:'',description:'',deadline:null,
    links:[],outlookLink:'',
    folderPath: parent.folderPath||'',  // (#7) overerving
    logEntries:[],outcome:'',status:'actief',
    position:maxPos+1,successors:[],requiredTasks:[],chosenSuccessorId:null,
    templateId:null,templateOverrides:{},pinned:false
  };
  openTaskModal(sub,proj,true,parent);
}

function openEditSubtask(subId, parentId) {
  const proj = getProj(st.catId,st.projId); if (!proj) return;
  const parent = getTask(proj,parentId); if (!parent) return;
  const sub = (parent.subtasks||[]).find(s => s.id===subId); if (!sub) return;
  openTaskModal(sub,proj,false,parent);
}

function openTaskModal(task, proj, isNew, parentTask) {
  const isSub = parentTask !== null;
  const cat = getCat(st.catId);
  const templates = cat?.templates||[];

  // (#9) Dep-list filtering
  let reqHtml = '';
  if (isSub) {
    const sibs = (parentTask.subtasks||[]).filter(s => s.id !== task.id);
    reqHtml = sibs.length
      ? `<div class="dep-list" id="dep-list">${sibs.map(s =>
          `<label class="dep-item"><input type="checkbox" value="${s.id}" ${(task.requiredTasks||[]).includes(s.id)?'checked':''}> ${esc(s.title)}</label>`
        ).join('')}</div>`
      : `<div style="color:var(--muted);font-size:12px;margin-bottom:6px;">Geen andere subtaken in deze hoofdtaak.</div><div id="dep-list"></div>`;

    // Cross-parent picker
    const otherParents = proj.tasks.filter(t => t.id !== parentTask.id && (t.subtasks||[]).length);
    reqHtml += `<div class="fg" style="margin-top:8px;">
      <label>Afhankelijkheid van andere hoofdtaak:</label>
      <select class="fc" id="cross-parent-sel" onchange="loadCrossParentOpts(this,'${parentTask.id}','${proj.id}')">
        <option value="">— Selecteer hoofdtaak —</option>
        ${otherParents.map(t=>`<option value="${t.id}">${esc(t.title)}</option>`).join('')}
      </select>
      <div id="cross-parent-opts" style="margin-top:6px;"></div>
    </div>`;
  } else {
    const others = proj.tasks.filter(t => t.id !== task.id);
    reqHtml = others.length
      ? `<div class="dep-list" id="dep-list">${others.map(t =>
          `<label class="dep-item"><input type="checkbox" value="${t.id}" ${(task.requiredTasks||[]).includes(t.id)?'checked':''}> ${esc(t.title)}</label>`
        ).join('')}</div>`
      : `<div style="color:var(--muted);font-size:12px;">Geen andere taken beschikbaar.</div><div id="dep-list"></div>`;

    // Cross-project picker (binnen dezelfde categorie)
    const otherProjects = cat ? cat.projects.filter(p => p.id !== proj.id) : [];
    if (otherProjects.length) {
      // Bestaande cross-project afhankelijkheden detecteren en tonen
      const crossProjDeps = (task.requiredTasks||[]).filter(id =>
        (cat?.projects||[]).some(p => p.id !== proj.id && findInProj(p, id))
      );
      let existingCrossHtml = '';
      if (crossProjDeps.length) {
        existingCrossHtml = `<div class="dep-list" id="cross-proj-current" style="margin-bottom:6px;">` +
          crossProjDeps.map(id => {
            let taskTitle = '?', projName = '?';
            for (const p of (cat?.projects||[])) {
              const t = findInProj(p, id);
              if (t) { taskTitle = t.title; projName = p.name; break; }
            }
            return `<label class="dep-item"><input type="checkbox" class="cross-dep" value="${id}" checked>` +
              `<span style="color:var(--muted);font-size:10px;">${esc(projName)} ›</span> ${esc(taskTitle)}</label>`;
          }).join('') +
        `</div>`;
      }
      reqHtml += `<div class="fg" style="margin-top:8px;">
        <label>Kies uit ander project:</label>
        ${existingCrossHtml}
        <select class="fc" id="cross-proj-sel" onchange="loadCrossProjOpts(this,'${task.id}')">
          <option value="">— Selecteer project —</option>
          ${otherProjects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}
        </select>
        <div id="cross-proj-opts" style="margin-top:6px;"></div>
      </div>`;
    }
  }

  const allTasksForSucc = isSub
    ? (parentTask.subtasks||[]).filter(s => s.id !== task.id)
    : proj.tasks.filter(t => t.id !== task.id);

  const taskOptHtml = `<option value="">— kies taak —</option>` +
    allTasksForSucc.map(t=>`<option value="${t.id}">${esc(t.title)}</option>`).join('');

  const succHtml = (task.successors||[]).map((s,i) =>
    `<div class="succ-row" data-sid="${s.id}">
      <span class="succ-order">${'ABCDE'[i]||i+1}.</span>
      <input class="succ-lbl" type="text" value="${esc(s.label)}" placeholder="Label…">
      <select class="succ-sel">${taskOptHtml.replace(`value="${s.taskId}"`,`value="${s.taskId}" selected`)}</select>
      <button class="rm-btn" onclick="this.closest('.succ-row').remove()">✕</button>
    </div>`
  ).join('');

  const linksHtml = (task.links||[]).map(l =>
    `<div class="link-row" data-lid="${l.id}">
      <input class="link-lbl" type="text" value="${esc(l.label)}" placeholder="Label…">
      <input class="link-url" type="text" value="${esc(l.url)}" placeholder="https://…">
      <button class="rm-btn" onclick="this.closest('.link-row').remove()">✕</button>
    </div>`
  ).join('');

  const logSection = isNew ? '' : `
    <div class="sec">Logboek</div>
    <div class="fg">
      <div class="log-box" id="log-box">
        ${!(task.logEntries||[]).length
          ? `<div style="color:var(--muted);font-size:12px;">Geen logregels.</div>`
          : task.logEntries.map(e=>`<div class="log-entry"><span class="log-ts">${esc(e.timestamp)}</span>${renderMarkup(e.text)}</div>`).join('')}
      </div>
      ${fmtToolbar('new-log')}
      <div class="log-input-row">
        <input class="fc" id="new-log" type="text" placeholder="Nieuwe logregel…" style="flex:1;" onkeydown="fmtKey(event,this)">
        <button class="btn btn-secondary" onclick="addLogInModal('${task.id}','${isSub?parentTask.id:''}')">+ Toevoegen</button>
      </div>
    </div>`;

  const outcomeSection = isNew ? '' : `
    <div class="fg"><label>Uitkomst / definitief antwoord</label>
      <textarea class="fc" id="t-outcome" rows="3">${esc(task.outcome||'')}</textarea>
    </div>`;

  const deleteBtn = isNew ? '' : `
    <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border);">
      <button class="btn btn-danger" onclick="${isSub?`delSubtask('${task.id}','${parentTask.id}')`:` delTask('${task.id}')`}">🗑 Taak verwijderen</button>
    </div>`;

  // (#10) Template selector (only for new tasks, not subtasks)
  const tmplSel = (!isSub && isNew && templates.length) ? `
    <div class="fg"><label>Sjabloon (optioneel)</label>
      <select class="fc" id="t-tmpl" onchange="applyTemplateToForm(this.value)">
        <option value="">— Leeg —</option>
        ${templates.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('')}
      </select>
    </div>` : '';

  // (#6) Volgorde: Titel, Omschrijving, Deadline+Status, Afhankelijkheden, Opvolgtaken, Links, Outlook, Mappad
  const body = `
    ${tmplSel}
    <div class="fg"><label>Titel *</label><input class="fc" id="t-title" value="${esc(task.title)}" placeholder="Taaknaam…"></div>
    <div class="fg"><label>Omschrijving</label>${fmtToolbar('t-desc')}<textarea class="fc" id="t-desc" rows="3" onkeydown="fmtKey(event,this)">${esc(task.description||'')}</textarea></div>
    <div class="f2">
      <div class="fg"><label>Deadline</label><input class="fc" id="t-dl" type="date" value="${task.deadline||''}"></div>
      <div class="fg"><label>Status</label>
        <select class="fc" id="t-status">
          ${['actief','wacht','klaar','geblokkeerd'].map(s=>
            `<option value="${s}" ${task.status===s?'selected':''}>${{actief:'Actief',wacht:'Wacht op antwoord',klaar:'Klaar',geblokkeerd:'Geblokkeerd'}[s]}</option>`
          ).join('')}
        </select>
      </div>
    </div>

    <div class="sec">Afhankelijkheden</div>
    <div class="fg"><label>Pas beschikbaar als de volgende taken klaar zijn:</label>${reqHtml}</div>

    <div class="sec">Opvolgtaken bij afronden</div>
    <div class="fg"><label>Vertakkingen</label>
      <div class="succ-list" id="succ-list">${succHtml}</div>
      <button class="add-row-btn" onclick="addSuccRow('${proj.id}','${isSub?parentTask.id:''}')">+ Opvolgtaak toevoegen</button>
    </div>

    <div class="sec">Links &amp; locatie</div>
    <div class="fg">
      <div class="links-list" id="links-list">${linksHtml}</div>
      <button class="add-row-btn" onclick="addLinkRow()">+ Link toevoegen</button>
    </div>
    <div class="fg"><label>Outlook-maillink</label>
      <input class="fc" id="t-outlook" value="${esc(task.outlookLink||'')}" placeholder="outlook://… of mailto:…">
      <div class="hint">Werkt alleen met Outlook als desktopapplicatie</div>
    </div>
    <div class="fg"><label>Mappad</label>
      <input class="fc" id="t-folder" value="${esc(task.folderPath||'')}" placeholder="C:\\Zaken\\Dossier of \\\\server\\map">
      <div class="hint">Een kopieerknop verschijnt op de kaart — plak het pad daarna in Verkenner</div>
    </div>

    ${outcomeSection}${logSection}${deleteBtn}`;

  openModal(isNew ? (isSub?'Nieuwe subtaak':'Nieuwe taak') : (isSub?'Subtaak bewerken':'Taak bewerken'), body, () => {
    const title = document.getElementById('t-title').value.trim();
    if (!title) { alert('Vul een titel in.'); return false; }

    pushUndo();
    task.title = title;
    task.description = document.getElementById('t-desc').value.trim();
    task.deadline = document.getElementById('t-dl').value || null; // (#2)
    task.status = document.getElementById('t-status').value;
    task.outlookLink = document.getElementById('t-outlook').value.trim();
    task.folderPath = document.getElementById('t-folder').value.trim();
    if (!isNew && document.getElementById('t-outcome'))
      task.outcome = document.getElementById('t-outcome').value.trim();

    task.links = Array.from(document.querySelectorAll('#links-list .link-row')).map(row => ({
      id: row.dataset.lid||uid(),
      label: row.querySelectorAll('input')[0].value.trim(),
      url:   row.querySelectorAll('input')[1].value.trim()
    })).filter(l => l.url);

    // required tasks: local deps + cross-parent deps
    const localDeps = Array.from(document.querySelectorAll('#dep-list input:checked')).map(cb => cb.value);
    const crossDeps = Array.from(document.querySelectorAll('.cross-dep:checked')).map(cb => cb.value);
    task.requiredTasks = [...new Set([...localDeps, ...crossDeps])];

    task.successors = Array.from(document.querySelectorAll('#succ-list .succ-row')).map((row,i) => ({
      id: row.dataset.sid||uid(),
      label: row.querySelector('.succ-lbl').value.trim(),
      taskId: row.querySelector('select').value,
      order: i
    })).filter(s => s.taskId);

    // (#10) template overrides detection
    if (task.templateId) {
      const t = (cat?.templates||[]).find(t => t.id===task.templateId);
      if (t) detectTemplateOverrides(task, t);
    }

    // (#10) apply template if newly selected
    const tmplEl = document.getElementById('t-tmpl');
    if (tmplEl && tmplEl.value && !task.templateId) {
      task.templateId = tmplEl.value;
    }

    if (isNew) {
      if (isSub) {
        if (!parentTask.subtasks) parentTask.subtasks = [];
        parentTask.subtasks.push(task);
        parentTask.isExpanded = true;
      } else {
        proj.tasks.push(task);
      }
    }

    save(); renderMain(); return true;
  });
}

function addLinkRow() {
  const id = uid();
  const div = document.createElement('div');
  div.className='link-row'; div.dataset.lid=id;
  div.innerHTML=`<input class="link-lbl" type="text" placeholder="Label…">
    <input class="link-url" type="text" placeholder="https://…">
    <button class="rm-btn" onclick="this.closest('.link-row').remove()">✕</button>`;
  document.getElementById('links-list').appendChild(div);
  div.querySelector('input').focus();
}

function addSuccRow(projId, parentId) {
  const r = findProjById(projId); if (!r) return;
  const parent = parentId ? getTask(r.proj, parentId) : null;
  const pool = parent ? (parent.subtasks||[]) : r.proj.tasks;
  const list = document.getElementById('succ-list');
  const idx = list.querySelectorAll('.succ-row').length;
  const id = uid();
  const opts = `<option value="">— kies taak —</option>`+pool.map(t=>`<option value="${t.id}">${esc(t.title)}</option>`).join('');
  const div = document.createElement('div');
  div.className='succ-row'; div.dataset.sid=id;
  div.innerHTML=`<span class="succ-order">${'ABCDE'[idx]||idx+1}.</span>
    <input class="succ-lbl" type="text" placeholder="Label…">
    <select class="succ-sel">${opts}</select>
    <button class="rm-btn" onclick="this.closest('.succ-row').remove()">✕</button>`;
  list.appendChild(div);
  div.querySelector('input').focus();
}

// (#9) Cross-parent dep loader
function loadCrossParentOpts(sel, currentParentId, projId) {
  const r = findProjById(projId); if (!r) return;
  const container = document.getElementById('cross-parent-opts');
  if (!sel.value) { container.innerHTML=''; return; }
  const otherParent = getTask(r.proj, sel.value);
  if (!otherParent?.subtasks?.length) {
    container.innerHTML='<div style="color:var(--muted);font-size:12px;">Geen subtaken in deze hoofdtaak.</div>';
    return;
  }
  // Get already-checked cross-parent IDs (from requiredTasks that are NOT siblings)
  const sibIds = new Set((getTask(r.proj, currentParentId)?.subtasks||[]).map(s=>s.id));
  container.innerHTML=`<div class="dep-list">`+
    otherParent.subtasks.map(s=>{
      const checked = document.querySelectorAll(`#dep-list input[value="${s.id}"]:checked`).length > 0;
      return `<label class="dep-item"><input type="checkbox" class="cross-dep" value="${s.id}" ${checked?'checked':''}> ${esc(s.title)}</label>`;
    }).join('')+
  `</div>`;
}

function loadCrossProjOpts(sel, currentTaskId) {
  const container = document.getElementById('cross-proj-opts');
  if (!container) return;
  if (!sel.value) { container.innerHTML = ''; return; }
  const r = findProjById(sel.value);
  if (!r) { container.innerHTML = ''; return; }
  // Sla taken over die al getoond worden als bestaande cross-project dep
  const existingIds = new Set(
    Array.from(document.querySelectorAll('#cross-proj-current input')).map(cb => cb.value)
  );
  const tasks = r.proj.tasks.filter(t => !existingIds.has(t.id));
  if (!tasks.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:12px;">Geen (overige) taken in dit project.</div>';
    return;
  }
  container.innerHTML = `<div class="dep-list">` +
    tasks.map(t =>
      `<label class="dep-item"><input type="checkbox" class="cross-dep" value="${t.id}"> ${esc(t.title)}</label>`
    ).join('') +
  `</div>`;
}

function addLogInModal(tid, parentId) {
  let task = null;
  const proj = getProj(st.catId, st.projId);
  if (parentId) {
    const parent = getTask(proj, parentId);
    task = (parent?.subtasks||[]).find(s => s.id===tid);
  } else {
    task = getTask(proj, tid);
  }
  if (!task) return;
  const text = document.getElementById('new-log').value.trim();
  if (!text) return;
  if (!task.logEntries) task.logEntries = [];
  task.logEntries.push({id:uid(),timestamp:nowStamp(),text});
  save();
  document.getElementById('log-box').innerHTML = task.logEntries.map(e=>
    `<div class="log-entry"><span class="log-ts">${esc(e.timestamp)}</span>${renderMarkup(e.text)}</div>`
  ).join('');
  document.getElementById('new-log').value = '';
  toast('Logregel toegevoegd');
}

// ═══════════════════════════════════════════════════════
// TASK ACTIONS
// ═══════════════════════════════════════════════════════
function completeAny(tid, parentId) {
  const proj = getProj(st.catId, st.projId); if (!proj) return;
  let task, isSub = false;
  if (parentId) {
    const parent = getTask(proj, parentId);
    task = (parent?.subtasks||[]).find(s => s.id===tid);
    isSub = true;
  } else {
    task = getTask(proj, tid);
  }
  if (!task) return;

  const validSucc = (task.successors||[]).filter(s => s.taskId && findInProj(proj, s.taskId));
  if (validSucc.length) {
    openBranchModal(task, proj, validSucc);
  } else {
    openModal('Taak afronden',`
      <div class="fg"><label>Uitkomst / antwoord (optioneel)</label>
        <textarea class="fc" id="co" rows="4">${esc(task.outcome||'')}</textarea>
      </div>`,() => {
      pushUndo();
      task.outcome = document.getElementById('co').value.trim();
      task.status = 'klaar'; save(); renderMain(); return true;
    });
  }
}

function openBranchModal(task, proj, successors) {
  const opts = successors.map((s,i) => {
    const t2 = findInProj(proj, s.taskId);
    return `<label class="branch-opt">
      <input type="radio" name="br" value="${s.id}" ${i===0?'checked':''}>
      <div><div class="bo-label">${esc(s.label||'Optie '+(i+1))}</div>
      <div class="bo-task">→ ${esc(t2?.title||'?')}</div></div>
      ${i===0?'<span class="bo-pref">★ Voorkeur</span>':''}
    </label>`;
  }).join('');
  openModal('Kies vervolg',`
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px;">Selecteer het vervolg na het afronden van <strong>${esc(task.title)}</strong>:</p>
    ${opts}
    <div class="fg" style="margin-top:14px;"><label>Uitkomst notitie (optioneel)</label>
      <input class="fc" id="br-out" type="text" value="${esc(task.outcome||'')}" placeholder="Omschrijf de uitkomst…">
    </div>`,() => {
    const chosen = document.querySelector('input[name="br"]:checked');
    if (!chosen) { alert('Kies een vervolg.'); return false; }
    pushUndo();
    const succ = successors.find(s => s.id===chosen.value);
    task.status = 'klaar'; task.chosenSuccessorId = succ.id;
    task.outcome = document.getElementById('br-out').value.trim();
    const succTask = findInProj(proj, succ.taskId);
    if (succTask && succTask.status !== 'klaar') succTask.status = 'actief';
    save(); renderMain(); return true;
  });
}

function quickLog(tid, parentId) {
  const proj = getProj(st.catId, st.projId); if (!proj) return;
  let task = parentId
    ? (getTask(proj, parentId)?.subtasks||[]).find(s => s.id===tid)
    : getTask(proj, tid);
  if (!task) return;
  openModal('Logregel toevoegen',`
    <div class="fg"><label>Logregel voor "${esc(task.title)}"</label>
      ${fmtToolbar('ql')}
      <textarea class="fc" id="ql" rows="4" placeholder="Wat is er gebeurd?" onkeydown="fmtKey(event,this)"></textarea>
    </div>`,() => {
    const text = document.getElementById('ql').value.trim();
    if (!text) { alert('Vul een logregel in.'); return false; }
    pushUndo();
    if (!task.logEntries) task.logEntries = [];
    task.logEntries.push({id:uid(),timestamp:nowStamp(),text});
    save(); renderMain(); return true;
  });
}

function delTask(tid) {
  const proj = getProj(st.catId, st.projId); if (!proj) return;
  const task = getTask(proj, tid); if (!task) return;
  if (task.pinned) { alert('Maak de taak eerst los (📌) voordat je hem verwijdert.'); return; }
  if (!confirm(`Verwijder taak "${task.title}"?`)) return;
  pushUndo();
  proj.tasks = proj.tasks.filter(t => t.id!==tid);
  save(); renderMain(); closeModal();
}

function delSubtask(sid, parentId) {
  const proj = getProj(st.catId, st.projId); if (!proj) return;
  const parent = getTask(proj, parentId); if (!parent) return;
  const sub = (parent.subtasks||[]).find(s => s.id===sid); if (!sub) return;
  if (sub.pinned) { alert('Maak de subtaak eerst los (📌) voordat je hem verwijdert.'); return; }
  if (!confirm(`Verwijder subtaak "${sub.title}"?`)) return;
  pushUndo();
  parent.subtasks = parent.subtasks.filter(s => s.id!==sid);
  save(); renderMain(); closeModal();
}

function togglePin(tid, parentId) {
  const proj = getProj(st.catId, st.projId); if (!proj) return;
  let task;
  if (parentId) {
    const parent = getTask(proj, parentId);
    task = (parent?.subtasks||[]).find(s => s.id===tid);
  } else {
    task = getTask(proj, tid);
  }
  if (!task) return;
  pushUndo();
  if (task.depPinned) {
    // Klikken op 🔵: geeft positie vrij maar laat dependency intact
    task.depPinned = false;
  } else {
    task.pinned = !task.pinned;
  }
  save(); renderMain();
}

function pinAll(cid, pid, val) {
  const proj = getProj(cid, pid); if (!proj) return;
  pushUndo();
  proj.tasks.forEach(t => {
    t.pinned = val;
    (t.subtasks||[]).forEach(s => s.pinned = val);
  });
  save(); renderMain();
}

function copyPath(btn) {
  const path = btn.dataset.path;
  const fallback = () => {
    const ta=document.createElement('textarea'); ta.value=path;
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove(); toast('Pad gekopieerd');
  };
  navigator.clipboard ? navigator.clipboard.writeText(path).then(()=>toast('Pad gekopieerd: '+path)).catch(fallback) : fallback();
}

// ═══════════════════════════════════════════════════════
// TEMPLATES (#10)
// ═══════════════════════════════════════════════════════
function manageTemplates(catId) {
  const cat = getCat(catId); if (!cat) return;
  if (!cat.templates) cat.templates = [];

  function listHtml() {
    return `<div style="display:flex;flex-direction:column;gap:7px;margin-bottom:14px;">
      ${cat.templates.length ? cat.templates.map(t=>`
        <div class="tmpl-row">
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:13px;">${esc(t.name)}</div>
            ${t.title?`<div style="font-size:11px;color:var(--muted)">${esc(t.title)}</div>`:''}
          </div>
          <button class="ca-btn ca-edit" onclick="editTemplate('${catId}','${t.id}')">✏</button>
          <button class="ca-btn" style="background:#fdeaea;color:var(--red);" onclick="deleteTemplate('${catId}','${t.id}')">✕</button>
        </div>`).join('')
      : '<div style="color:var(--muted);font-size:13px;">Geen sjablonen voor deze categorie.</div>'}
    </div>
    <button class="btn btn-primary" onclick="editTemplate('${catId}',null)">+ Nieuw sjabloon</button>`;
  }

  openModal(`Sjablonen — ${esc(cat.name)}`, listHtml(), () => true);
  // Hide "Opslaan" button — this is a view-only modal
  const ok = document.getElementById('modal-ok');
  if (ok) ok.style.display='none';
  const cancel = document.querySelector('.modal-foot .btn-secondary');
  if (cancel) cancel.textContent='Sluiten';
}

function editTemplate(catId, templateId) {
  const cat = getCat(catId); if (!cat) return;
  if (!cat.templates) cat.templates = [];
  const isNew = !templateId;
  let t = isNew
    ? {id:uid(),name:'',title:'',description:'',links:[],folderPath:'',outlookLink:'',successors:[]}
    : cat.templates.find(x => x.id===templateId);
  if (!t) return;

  const linksHtml = (t.links||[]).map(l=>
    `<div class="link-row" data-lid="${l.id||uid()}">
      <input class="link-lbl" type="text" value="${esc(l.label)}" placeholder="Label…">
      <input class="link-url" type="text" value="${esc(l.url)}" placeholder="https://…">
      <button class="rm-btn" onclick="this.closest('.link-row').remove()">✕</button>
    </div>`).join('');

  openModal(isNew?'Nieuw sjabloon':'Sjabloon bewerken',`
    <div class="fg"><label>Naam sjabloon *</label><input class="fc" id="tn" value="${esc(t.name)}" placeholder="Naam…"></div>
    <div class="fg"><label>Standaard taaknaam</label><input class="fc" id="tt" value="${esc(t.title||'')}" placeholder="Taaknaam…"></div>
    <div class="fg"><label>Omschrijving</label><textarea class="fc" id="td" rows="3">${esc(t.description||'')}</textarea></div>
    <div class="fg"><label>Mappad</label><input class="fc" id="tf" value="${esc(t.folderPath||'')}" placeholder="C:\\…"></div>
    <div class="fg"><label>Outlook-maillink</label><input class="fc" id="to" value="${esc(t.outlookLink||'')}" placeholder="outlook://…"></div>
    <div class="sec">Links</div>
    <div class="fg">
      <div class="links-list" id="links-list">${linksHtml}</div>
      <button class="add-row-btn" onclick="addLinkRow()">+ Link toevoegen</button>
    </div>
    ${isNew?'':`<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);">
      <button class="btn btn-danger" onclick="deleteTemplate('${catId}','${t.id}')">🗑 Sjabloon verwijderen</button>
    </div>`}
  `,() => {
    const name = document.getElementById('tn').value.trim();
    if (!name) { alert('Vul een naam in.'); return false; }
    t.name = name;
    t.title = document.getElementById('tt').value.trim();
    t.description = document.getElementById('td').value.trim();
    t.folderPath = document.getElementById('tf').value.trim();
    t.outlookLink = document.getElementById('to').value.trim();
    t.links = Array.from(document.querySelectorAll('#links-list .link-row')).map(row=>({
      id:row.dataset.lid||uid(),
      label:row.querySelectorAll('input')[0].value.trim(),
      url:row.querySelectorAll('input')[1].value.trim()
    })).filter(l=>l.url);
    if (isNew) cat.templates.push(t);
    applyTemplateToTasks(catId, t);
    save(); renderSidebar(); toast(isNew?'Sjabloon aangemaakt':'Sjabloon bijgewerkt'); return true;
  });
}

function deleteTemplate(catId, templateId) {
  const cat = getCat(catId); if (!cat) return;
  const t = (cat.templates||[]).find(x => x.id===templateId); if (!t) return;
  if (!confirm(`Sjabloon "${t.name}" verwijderen?`)) return;
  cat.templates = cat.templates.filter(x => x.id!==templateId);
  save(); closeModal(); toast('Sjabloon verwijderd');
}

function applyTemplateToTasks(catId, tmpl) {
  const cat = getCat(catId); if (!cat) return;
  for (const p of cat.projects)
    for (const t of p.tasks) {
      if (t.templateId===tmpl.id) syncFromTemplate(t,tmpl);
      for (const s of (t.subtasks||[]))
        if (s.templateId===tmpl.id) syncFromTemplate(s,tmpl);
    }
}
function syncFromTemplate(task, tmpl) {
  const ov = task.templateOverrides||{};
  if (!ov.title && tmpl.title) task.title = tmpl.title;
  if (!ov.description) task.description = tmpl.description||'';
  if (!ov.folderPath) task.folderPath = tmpl.folderPath||'';
  if (!ov.outlookLink) task.outlookLink = tmpl.outlookLink||'';
  if (!ov.links) task.links = JSON.parse(JSON.stringify(tmpl.links||[]));
}
function detectTemplateOverrides(task, tmpl) {
  task.templateOverrides = task.templateOverrides||{};
  const ov = task.templateOverrides;
  if (task.title !== (tmpl.title||'')) ov.title=true; else delete ov.title;
  if (task.description !== (tmpl.description||'')) ov.description=true; else delete ov.description;
  if (task.folderPath !== (tmpl.folderPath||'')) ov.folderPath=true; else delete ov.folderPath;
  if (task.outlookLink !== (tmpl.outlookLink||'')) ov.outlookLink=true; else delete ov.outlookLink;
  if (JSON.stringify(task.links) !== JSON.stringify(tmpl.links||[])) ov.links=true; else delete ov.links;
}
function applyTemplateToForm(templateId) {
  if (!templateId) return;
  const cat = getCat(st.catId); if (!cat) return;
  const t = (cat.templates||[]).find(x => x.id===templateId); if (!t) return;
  const get = id => document.getElementById(id);
  if (get('t-title')) get('t-title').value = t.title||'';
  if (get('t-desc')) get('t-desc').value = t.description||'';
  if (get('t-folder')) get('t-folder').value = t.folderPath||'';
  if (get('t-outlook')) get('t-outlook').value = t.outlookLink||'';
  const ll = document.getElementById('links-list');
  if (ll) ll.innerHTML = (t.links||[]).map(l=>
    `<div class="link-row" data-lid="${l.id||uid()}">
      <input class="link-lbl" type="text" value="${esc(l.label)}" placeholder="Label…">
      <input class="link-url" type="text" value="${esc(l.url)}" placeholder="https://…">
      <button class="rm-btn" onclick="this.closest('.link-row').remove()">✕</button>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════
// MODAL ENGINE
// ═══════════════════════════════════════════════════════
function openModal(title, body, onSave) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="overlay" id="modal-overlay">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head">
          <div class="modal-title">${esc(title)}</div>
          <button class="modal-x" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">${body}</div>
        <div class="modal-foot">
          <button class="btn btn-secondary" onclick="closeModal()">Annuleren</button>
          <button class="btn btn-primary" id="modal-ok">Opslaan</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-overlay').addEventListener('click', e => {
    // Modal sluit NIET bij klikken buiten — alleen via Opslaan of Annuleren
  });
  document.getElementById('modal-ok').addEventListener('click', () => {
    if (onSave()) closeModal();
  });
  setTimeout(() => {
    const titleEl = root.querySelector('#t-title');
    const f = titleEl || root.querySelector('input[type="text"],textarea,input[type="date"],select');
    if (f) f.focus();
  }, 40);
}
// Strikte modal: sluit NIET bij klikken buiten venster of Escape
function openModalStrict(title, body, onSave) {
  const root = document.getElementById('modal-root');
  root.dataset.strict = '1';
  root.innerHTML = `
    <div class="overlay" id="modal-overlay">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head">
          <div class="modal-title">${esc(title)}</div>
        </div>
        <div class="modal-body">${body}</div>
        <div class="modal-foot">
          <button class="btn btn-secondary" onclick="closeModal()">Annuleren</button>
          <button class="btn btn-primary" id="modal-ok">Opslaan</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-ok').addEventListener('click', () => {
    if (onSave()) closeModal();
  });
  setTimeout(() => {
    const f = root.querySelector('textarea,input[type="text"]');
    if (f) f.focus();
  }, 40);
}
function closeModal() {
  const r = document.getElementById('modal-root');
  delete r.dataset.strict;
  r.innerHTML = '';
}

// ═══════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key==='Escape') {
    const root = document.getElementById('modal-root');
    if (root?.dataset?.strict === '1') return;
    closeModal(); return;
  }
  const tag = document.activeElement?.tagName;
  const inField = tag==='INPUT' || tag==='TEXTAREA' || document.activeElement?.isContentEditable;
  if ((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey && !inField) {
    e.preventDefault(); undo();
  }
  if ((e.ctrlKey||e.metaKey) && e.key==='z' && e.shiftKey && !inField) {
    e.preventDefault(); redo();
  }
});

load();
if (st.catId) st.openCats.add(st.catId);
render();
