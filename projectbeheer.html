<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projectbeheer</title>
<style>
:root {
  --bg:#f0f2f5;--sidebar:#1e2a38;--sidebar-hover:#2d3f52;--sidebar-active:#2980b9;
  --card:#fff;--text:#2c3e50;--muted:#7f8c8d;--border:#e0e4e8;
  --shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 6px 20px rgba(0,0,0,.13);
  --radius:10px;--accent:#3498db;--green:#27ae60;--orange:#e67e22;--red:#e74c3c;--grey:#95a5a6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:var(--sidebar);display:flex;flex-direction:column;color:#ecf0f1;overflow:hidden;}
.sb-head{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-head h1{font-size:15px;font-weight:700;color:#fff;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.sb-head-btns{display:flex;gap:6px;}
.sb-btn{background:rgba(255,255,255,.1);border:none;color:#ecf0f1;border-radius:6px;padding:5px 9px;font-size:11px;cursor:pointer;transition:background .15s;font-family:inherit;}
.sb-btn:hover{background:rgba(255,255,255,.2);}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0;}
.cat-wrap{margin-bottom:1px;}
.cat-row{display:flex;align-items:center;padding:7px 10px 7px 14px;cursor:pointer;transition:background .15s;gap:6px;user-select:none;}
.cat-row:hover{background:var(--sidebar-hover);}
.cat-arrow{font-size:9px;color:rgba(255,255,255,.45);width:12px;flex-shrink:0;transition:transform .2s;display:inline-block;}
.cat-arrow.open{transform:rotate(90deg);}
.cat-name{flex:1;font-size:12px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:.3px;text-transform:uppercase;}
.cat-acts{display:none;gap:3px;}
.cat-row:hover .cat-acts{display:flex;}
.ic-btn{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;padding:2px 4px;border-radius:3px;font-size:12px;line-height:1;transition:all .15s;}
.ic-btn:hover{color:#fff;background:rgba(255,255,255,.12);}
.proj-list{padding-left:24px;display:none;}
.proj-list.open{display:block;}
.proj-row{display:flex;align-items:center;padding:5px 10px 5px 6px;cursor:pointer;border-radius:5px;gap:6px;margin:1px 4px;}
.proj-row:hover{background:var(--sidebar-hover);}
.proj-row.active{background:var(--sidebar-active);}
.proj-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);flex-shrink:0;}
.proj-row.active .proj-dot{background:#fff;}
.proj-name{flex:1;font-size:12px;color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.proj-row.active .proj-name{color:#fff;font-weight:500;}
.proj-acts{display:none;gap:2px;}
.proj-row:hover .proj-acts,.proj-row.active .proj-acts{display:flex;}
.add-proj{display:flex;align-items:center;gap:5px;padding:5px 6px;color:rgba(255,255,255,.35);cursor:pointer;font-size:11px;border-radius:4px;transition:color .15s;margin:2px 4px;}
.add-proj:hover{color:rgba(255,255,255,.75);}
.sb-foot{padding:10px 12px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:6px;}
.dl-nav{display:flex;align-items:center;gap:7px;padding:7px 10px;cursor:pointer;border-radius:6px;color:rgba(255,255,255,.65);font-size:12px;transition:background .15s;}
.dl-nav:hover,.dl-nav.active{background:var(--sidebar-hover);color:#fff;}
.sb-add-cat{background:rgba(255,255,255,.07);border:none;color:rgba(255,255,255,.6);cursor:pointer;padding:7px 10px;border-radius:6px;font-size:12px;width:100%;text-align:left;transition:background .15s;font-family:inherit;}
.sb-add-cat:hover{background:rgba(255,255,255,.14);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.main-header{background:var(--card);border-bottom:1px solid var(--border);padding:9px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;}
.mh-info{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mh-title{font-size:14px;font-weight:700;}
.mh-sep{color:var(--muted);}
.mh-sub{font-size:12px;color:var(--muted);}
.mh-cat{font-size:11px;color:#bbb;}
.mh-acts{display:flex;gap:8px;flex-shrink:0;align-items:center;}
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;font-family:inherit;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#2471a3;}
.btn-secondary{background:#f0f2f5;color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:#e4e8ed;}
.btn-danger{background:#fdeaea;color:var(--red);border:1px solid #f5c6c6;}
.btn-danger:hover{background:#f5b7b1;}

/* PINNED NOTE — collapsible */
.pinned-bar{background:#fffdf0;border-bottom:1px solid #f0e8a0;display:flex;align-items:center;gap:8px;padding:8px 20px;flex-shrink:0;transition:background .15s;}
.pinned-bar:hover{background:#fffbe0;}
.pinned-preview{flex:1;font-size:12px;color:#8a7000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pinned-arrow{font-size:10px;color:#b8a030;flex-shrink:0;cursor:pointer;padding:2px 5px;border-radius:3px;transition:background .15s;}
.pinned-arrow:hover{background:#f0e8a0;}
.pinned-full{background:#fffdf0;border-bottom:1px solid #f0e8a0;flex-shrink:0;display:flex;flex-direction:column;max-height:30vh;}
.pinned-full-head{display:flex;align-items:center;gap:8px;padding:8px 20px;flex-shrink:0;}
.pinned-full-body{overflow-y:auto;padding:0 20px 10px;}
.pinned-text{font-size:13px;color:#7a6500;white-space:pre-wrap;line-height:1.5;}
.pinned-edit{background:none;border:none;color:#c8b050;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:3px;flex-shrink:0;}
.pinned-edit:hover{background:#f0e8a0;}

/* TIMELINE */
.tl-area{flex:1;overflow-x:auto;overflow-y:auto;padding:24px;}
.tl{display:flex;align-items:flex-start;min-height:0;gap:10px;width:fit-content;}
.tl-empty{display:flex;align-items:center;justify-content:center;height:260px;color:var(--muted);font-size:14px;flex:1;}

/* CARD WRAPPER (voor subtakenrij) (#8) */
.card-wrapper{display:flex;flex-direction:column;flex-shrink:0;}
.subtask-row{margin-top:6px;padding:8px 10px;background:rgba(0,0,0,.035);border-radius:8px;display:flex;align-items:flex-start;gap:0;}
.tl-sub{display:flex;align-items:flex-start;gap:10px;}
.subtask-toggle{display:flex;align-items:center;gap:5px;padding:5px 14px 8px;font-size:11px;color:var(--muted);cursor:pointer;border-top:1px solid var(--border);transition:color .15s;user-select:none;}
.subtask-toggle:hover{color:var(--text);}

/* CARDS (#3 deadline dot, #4 narrower, #5 wacht→blauw) */
.card{border-radius:var(--radius);box-shadow:var(--shadow);background:var(--card);border:2px solid transparent;transition:box-shadow .2s;position:relative;flex-shrink:0;z-index:2;}
.card:hover{box-shadow:var(--shadow-lg);}

/* actief: groen */
.card.c-actief{width:fit-content;min-width:235px;max-width:300px;border-color:var(--green);}
/* wacht: blauw (was geel) */
.card.c-wacht{width:fit-content;min-width:235px;max-width:300px;border-color:var(--accent);}
.card.c-geblokkeerd{width:fit-content;min-width:210px;max-width:280px;border-color:#ccc;opacity:.8;}
.card.c-klaar{width:180px;border-color:#e0e0e0;}
/* subtaak-variant: wat kleiner */
.card.sub-card.c-actief,.card.sub-card.c-wacht{min-width:185px;max-width:240px;}
.card.sub-card.c-klaar{width:150px;}
.card.sub-card.c-geblokkeerd{min-width:170px;max-width:230px;}

.card-head{padding:11px 14px 8px;border-radius:var(--radius) var(--radius) 0 0;position:relative;z-index:3;isolation:isolate;background-clip:padding-box;}
.ch-actief{background:linear-gradient(135deg,#e8f8ef,#d4f0e0);}
/* wacht nu lichtblauw */
.ch-wacht{background:linear-gradient(135deg,#e8f4fd,#d0e8f8);}
.ch-geblokkeerd{background:#f5f5f5;}
.ch-klaar{background:#f5f5f5;}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:4px;margin-bottom:5px;position:relative;z-index:4;}
.b-actief{background:var(--green);color:#fff;}
/* wacht nu blauw */
.b-wacht{background:var(--accent);color:#fff;}
.b-klaar{background:var(--grey);color:#fff;}
.b-geblokkeerd{background:var(--grey);color:#fff;}

.card-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;position:relative;z-index:4;background:transparent;}
.c-klaar .card-title{font-size:12px;color:var(--muted);}
.sub-card .card-title{font-size:13px;}

.card-body{padding:8px 14px 9px;max-height:320px;overflow-y:auto;}
.card-desc{font-size:12px;color:var(--muted);margin-bottom:6px;line-height:1.4;max-height:calc(1.4em * 5);overflow-y:auto;}

/* deadline chip: alleen bolletje, geen rand op kaart (#3) */
.dl-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 7px;border-radius:4px;margin-bottom:6px;font-weight:500;background:#f0f2f5;color:var(--muted);}
.dl-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dl-dot-soon{background:var(--orange);}
.dl-dot-urgent{background:var(--red);}

.card-links{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.lnk-btn{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;background:#eaf4fb;color:#2471a3;border-radius:4px;font-size:11px;text-decoration:none;border:1px solid #d0e8f5;transition:background .15s;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lnk-btn:hover{background:#d0e8f5;}
.lnk-outlook{background:#e8f0fe;color:#1a73e8;border-color:#c5d8fb;}
.lnk-outlook:hover{background:#c5d8fb;}

.folder-row{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);margin-bottom:5px;}
.folder-path{font-family:monospace;font-size:10px;word-break:break-all;}
.copy-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:1px 6px;cursor:pointer;font-size:10px;transition:all .15s;flex-shrink:0;}
.copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.log-latest{font-size:11px;color:var(--muted);font-style:italic;margin-top:5px;padding-top:5px;border-top:1px solid var(--border);}
.card-outcome{font-size:11px;color:#6b7a8d;font-style:italic;margin-top:3px;padding:0 14px 7px;}

/* knoppen op kaart — wrappen als kaart smal is */
.card-acts{display:flex;gap:5px;padding:0 14px 10px;flex-wrap:wrap;}
.ca-btn{padding:4px 8px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:500;transition:all .15s;font-family:inherit;white-space:nowrap;flex-shrink:1;min-width:0;}
.ca-edit{background:#f0f2f5;color:var(--text);border:1px solid var(--border);}
.ca-edit:hover{background:#e4e8ed;}
.ca-done{background:var(--green);color:#fff;}
.ca-done:hover{background:#229954;}
.ca-log{background:#f0f2f5;color:var(--muted);border:1px solid var(--border);}
.ca-log:hover{background:#e4e8ed;}

.blocked-over{display:flex;align-items:flex-start;gap:5px;padding:2px 0 2px;}
.lock-ico{font-size:12px;flex-shrink:0;line-height:1.3;margin-top:-1px;}
.block-lbl{font-size:11px;color:var(--muted);line-height:1.4;}

/* vastgepinde hoofdtaak-indicator */
.pinned-task-badge{position:absolute;top:6px;left:6px;font-size:9px;background:rgba(0,0,0,.08);color:var(--muted);padding:1px 5px;border-radius:3px;pointer-events:none;}

.drag-hdl{position:absolute;top:7px;right:26px;color:rgba(0,0,0,.15);font-size:13px;cursor:grab;padding:2px;border-radius:3px;line-height:1;}
.card:hover .drag-hdl{color:rgba(0,0,0,.35);}
.card[draggable="true"]{cursor:grab;}
.pin-btn{position:absolute;top:5px;right:5px;background:none;border:none;cursor:pointer;font-size:12px;padding:2px 3px;border-radius:3px;line-height:1;opacity:.18;transition:all .15s;z-index:1;}
.pin-btn:hover{opacity:.75;background:rgba(0,0,0,.07);}
.pin-btn.is-pinned{opacity:1;}
.card.dragging{opacity:.45;cursor:grabbing;}
.card.drag-over{outline:2px dashed var(--accent);outline-offset:2px;}

.add-card{width:130px;height:68px;border-radius:var(--radius);border:2px dashed #ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#aaa;font-size:12px;gap:4px;flex-shrink:0;transition:all .15s;background:#fff;align-self:center;}
.add-card:hover{border-color:var(--accent);color:var(--accent);}

/* DEADLINES VIEW */
.dl-panel{flex:1;overflow-y:auto;padding:24px;}
.dl-list{display:flex;flex-direction:column;gap:8px;}
.dl-item{background:var(--card);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);border-left:4px solid #ddd;cursor:pointer;transition:box-shadow .15s;}
.dl-item:hover{box-shadow:var(--shadow-lg);}
.dl-item.di-ok{border-left-color:var(--accent);}
.dl-item.di-soon{border-left-color:var(--orange);}
.dl-item.di-urgent{border-left-color:var(--red);}
.di-date{font-size:13px;font-weight:700;min-width:88px;white-space:nowrap;}
.di-date.urgent{color:var(--red);}
.di-date.soon{color:var(--orange);}
.di-info{flex:1;min-width:0;}
.di-task{font-size:14px;font-weight:500;}
.di-proj{font-size:11px;color:var(--muted);margin-top:2px;}
.di-badge{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap;}

/* EMPTY STATE */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);}
.es-icon{font-size:44px;opacity:.25;}
.es-title{font-size:15px;font-weight:600;}
.es-sub{font-size:13px;text-align:center;max-width:280px;line-height:1.5;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.modal{background:var(--card);border-radius:12px;width:100%;max-width:680px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-title{font-size:16px;font-weight:700;}
.modal-x{background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;padding:3px 6px;border-radius:4px;line-height:1;}
.modal-x:hover{background:#f0f2f5;color:var(--text);}
.modal-body{flex:1;overflow-y:auto;padding:18px 22px;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}

/* FORMS */
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;}
.hint{font-size:11px;color:var(--muted);margin-top:3px;font-style:italic;}
.fc{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--text);background:#fff;transition:border-color .15s;font-family:inherit;}
.fc:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(52,152,219,.1);}
textarea.fc{resize:vertical;min-height:72px;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.links-list{display:flex;flex-direction:column;gap:6px;margin-bottom:7px;}
.link-row{display:flex;align-items:center;gap:6px;background:#f8f9fa;border-radius:6px;padding:7px 9px;border:1px solid var(--border);}
.link-row input{border:none;background:none;font-size:12px;color:var(--text);padding:0;font-family:inherit;min-width:0;}
.link-row input:focus{outline:none;}
.link-lbl{width:110px;flex-shrink:0;color:var(--muted);}
.link-url{flex:1;}
.rm-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:1px 4px;border-radius:3px;line-height:1;flex-shrink:0;}
.rm-btn:hover{background:#fdeaea;}
.add-row-btn{background:none;border:1px dashed var(--border);color:var(--muted);cursor:pointer;padding:6px 12px;border-radius:6px;font-size:12px;width:100%;transition:all .15s;font-family:inherit;}
.add-row-btn:hover{border-color:var(--accent);color:var(--accent);}
.log-box{max-height:160px;overflow-y:auto;padding:8px;background:#f8f9fa;border-radius:6px;border:1px solid var(--border);margin-bottom:8px;}
.log-entry{font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);}
.log-entry:last-child{border-bottom:none;}
.log-ts{font-size:10px;color:var(--muted);font-weight:600;margin-right:6px;}
.log-input-row{display:flex;gap:6px;}
.dep-list{max-height:140px;overflow-y:auto;padding:8px;background:#f8f9fa;border-radius:6px;border:1px solid var(--border);display:flex;flex-direction:column;gap:5px;margin-bottom:6px;}
.dep-item{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;}
.succ-list{display:flex;flex-direction:column;gap:6px;margin-bottom:7px;}
.succ-row{display:flex;align-items:center;gap:6px;background:#f8f9fa;border-radius:6px;padding:7px 9px;border:1px solid var(--border);}
.succ-row input{border:none;background:none;font-size:12px;color:var(--text);padding:0;font-family:inherit;}
.succ-row input:focus{outline:none;}
.succ-order{font-size:11px;font-weight:700;color:var(--accent);width:18px;flex-shrink:0;}
.succ-lbl{flex:1;}
.succ-sel{flex:1;border:none;background:none;font-size:12px;color:var(--text);font-family:inherit;padding:0;}
.succ-sel:focus{outline:none;}
.branch-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:background .1s;margin-bottom:7px;}
.branch-opt:hover{background:#f0f8ff;}
.branch-opt input[type="radio"]{flex-shrink:0;}
.bo-label{font-weight:600;font-size:13px;}
.bo-task{font-size:11px;color:var(--muted);margin-top:2px;}
.bo-pref{margin-left:auto;font-size:10px;color:var(--accent);font-weight:600;flex-shrink:0;}
.tmpl-row{display:flex;align-items:center;gap:8px;padding:9px 11px;background:#f8f9fa;border-radius:6px;border:1px solid var(--border);margin-bottom:7px;}
.tmpl-row:last-child{margin-bottom:0;}
.fmt-bar{display:flex;gap:3px;margin-bottom:4px;}
.fmt-btn{background:#f0f2f5;border:1px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:12px;font-family:inherit;line-height:1.5;transition:background .15s;}
.fmt-btn:hover{background:#e4e8ed;border-color:#bbb;}
.toast{position:fixed;bottom:22px;right:22px;background:#2c3e50;color:#fff;padding:9px 16px;border-radius:8px;font-size:12px;z-index:2000;box-shadow:var(--shadow-lg);animation:tin .2s ease,tout .25s ease 2.2s forwards;}
@keyframes tin{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
@keyframes tout{from{opacity:1}to{opacity:0}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#aaa;}
/* Horizontale scrollbalk tijdlijn: 16px klikzone, visueel smal via transparante rand */
.tl-area::-webkit-scrollbar:horizontal,.proj-tl-area::-webkit-scrollbar:horizontal{height:16px;}
.tl-area::-webkit-scrollbar-thumb:horizontal,.proj-tl-area::-webkit-scrollbar-thumb:horizontal{background:#ccc;border-radius:8px;border:5px solid transparent;background-clip:padding-box;}
.tl-area::-webkit-scrollbar-thumb:horizontal:hover,.proj-tl-area::-webkit-scrollbar-thumb:horizontal:hover{background:#aaa;background-clip:padding-box;}

/* CATEGORIE-VIEW — projecten verticaal gestapeld */
.cat-projects{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 24px;display:flex;flex-direction:column;gap:14px;position:relative;isolation:isolate;}
.proj-block{background:var(--card);border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:visible;}
.proj-block-head{display:flex;align-items:center;gap:10px;padding:7px 12px;background:#fafbfc;border-bottom:1px solid var(--border);border-radius:12px 12px 0 0;position:relative;z-index:5;}
.proj-block.is-collapsed .proj-block-head{border-bottom:none;border-radius:12px;}
.pbh-toggle{cursor:pointer;color:var(--muted);font-size:11px;width:20px;flex-shrink:0;user-select:none;padding:2px 4px;border-radius:3px;line-height:1;text-align:center;}
.pbh-toggle:hover{color:var(--text);background:#e4e8ed;}
.pbh-info{flex:1;min-width:0;display:flex;align-items:baseline;gap:0;overflow:hidden;}
.pbh-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;flex-shrink:0;}
.pbh-desc{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.pbh-acts{display:flex;gap:5px;flex-shrink:0;align-items:center;flex-wrap:wrap;}
.proj-block-body{display:flex;flex-direction:column;}
.proj-tl-area{overflow-x:auto;padding:16px 24px 16px;}
.proj-tl-area .tl{min-height:0;width:fit-content;}
.proj-collapsed-info{padding:9px 16px 9px 46px;font-size:12px;color:var(--muted);}
.cross-proj-indicator{color:var(--accent);font-weight:500;}
.cat-row.cat-active{background:var(--sidebar-active) !important;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-head">
    <h1>📋 Projectbeheer</h1>
    <div class="sb-head-btns">
      <button class="sb-btn" onclick="exportData()">⬇ Export</button>
      <label class="sb-btn" style="cursor:pointer">⬆ Import<input type="file" accept=".json" onchange="importData(event)" hidden></label>
    </div>
  </div>
  <nav id="sb-nav" class="sb-nav"></nav>
  <div class="sb-foot">
    <div id="dl-nav" class="dl-nav" onclick="showView('deadlines')">📅 Naderende deadlines</div>
    <button class="sb-add-cat" onclick="addCategory()">+ Nieuwe categorie</button>
  </div>
</div>

<main class="main" id="main"></main>
<div id="modal-root"></div>
<div id="toasts"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}-${m}-${y}`;
}
function dlClass(iso) {
  if (!iso) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = (new Date(iso+'T00:00:00') - today) / 86400000;
  if (diff < 0) return 'urgent';
  if (diff <= 2) return 'soon';
  return 'ok';
}
function nowStamp() {
  const n = new Date();
  return n.toLocaleDateString('nl-NL',{day:'2-digit',month:'2-digit'}) + ' ' +
         n.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
}
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// ── TEKSTOPMAAK ──────────────────────────────────────────
function renderMarkup(s) {
  if (!s) return '';
  return esc(s)
    .replace(/\*\*([\s\S]*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([\s\S]*?)\*/g, '<em>$1</em>')
    .replace(/__([\s\S]*?)__/g, '<u>$1</u>');
}
function applyFmtEl(el, type) {
  const m = {bold:['**','**'], italic:['*','*'], underline:['__','__']};
  const [o,c] = m[type];
  const s = el.selectionStart, e = el.selectionEnd;
  const sel = el.value.slice(s,e);
  el.value = el.value.slice(0,s) + o + sel + c + el.value.slice(e);
  el.selectionStart = s + o.length;
  el.selectionEnd = e + o.length;
  el.focus();
}
function fmtKey(ev, el) {
  if (!ev.ctrlKey && !ev.metaKey) return;
  const k = ev.key.toLowerCase();
  if (k==='b') { ev.preventDefault(); applyFmtEl(el,'bold'); }
  else if (k==='i') { ev.preventDefault(); applyFmtEl(el,'italic'); }
  else if (k==='u') { ev.preventDefault(); applyFmtEl(el,'underline'); }
}
function fmtToolbar(id) {
  return `<div class="fmt-bar">
    <button type="button" class="fmt-btn" onclick="applyFmtEl(document.getElementById('${id}'),'bold')" title="Vet (Ctrl+B)"><b>V</b></button>
    <button type="button" class="fmt-btn" onclick="applyFmtEl(document.getElementById('${id}'),'italic')" title="Cursief (Ctrl+I)"><i>I</i></button>
    <button type="button" class="fmt-btn" onclick="applyFmtEl(document.getElementById('${id}'),'underline')" title="Onderstreept (Ctrl+U)"><u>U</u></button>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// DATA & UNDO (#11)
// ═══════════════════════════════════════════════════════
const KEY = 'pb_v1';
let db = { categories: [] };
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 10;

function load() {
  try { const r = localStorage.getItem(KEY); if (r) db = JSON.parse(r); } catch(e) {}
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(db)); } catch(e) {}
}
function pushUndo() {
  undoStack.push(JSON.stringify(db));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack.length = 0;
}
function undo() {
  if (!undoStack.length) { toast('Niets om ongedaan te maken'); return; }
  redoStack.push(JSON.stringify(db));
  db = JSON.parse(undoStack.pop());
  save(); render(); toast('Ongedaan gemaakt');
}
function redo() {
  if (!redoStack.length) { toast('Niets om opnieuw uit te voeren'); return; }
  undoStack.push(JSON.stringify(db));
  db = JSON.parse(redoStack.pop());
  save(); render(); toast('Opnieuw uitgevoerd');
}

function exportData() {
  const blob = new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a = Object.assign(document.createElement('a'),{
    href:URL.createObjectURL(blob),
    download:'projectbeheer-'+new Date().toISOString().slice(0,10)+'.json'
  });
  a.click(); URL.revokeObjectURL(a.href); toast('Geëxporteerd');
}
function importData(ev) {
  const f = ev.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const imp = JSON.parse(e.target.result);
      if (!imp.categories) throw new Error('Ongeldig formaat');
      if (!confirm('Huidige data vervangen met backup?')) { ev.target.value=''; return; }
      db = imp; save(); st.catId = st.projId = null; render(); toast('Geïmporteerd');
    } catch(err) { alert('Fout: '+err.message); }
    ev.target.value = '';
  };
  r.readAsText(f);
}

// Finders
const getCat  = id => db.categories.find(c => c.id === id);
const getProj = (cid,pid) => getCat(cid)?.projects.find(p => p.id === pid);
const getTask = (proj,tid) => proj?.tasks.find(t => t.id === tid);

// Find any task or subtask by id within a project
function findInProj(proj, id) {
  for (const t of proj.tasks) {
    if (t.id === id) return t;
    for (const s of (t.subtasks||[])) if (s.id === id) return s;
  }
  return null;
}
// Find parent main task of a subtask
function findParentTask(proj, subId) {
  return proj.tasks.find(t => (t.subtasks||[]).some(s => s.id === subId));
}
function findProjById(pid) {
  for (const c of db.categories)
    for (const p of c.projects)
      if (p.id === pid) return { cat: c, proj: p };
  return null;
}
function allDeadlineTasks() {
  const out = [];
  for (const c of db.categories)
    for (const p of c.projects)
      for (const t of p.tasks) {
        if (t.deadline && t.status !== 'klaar') out.push({t,p,c,parentTitle:null});
        for (const s of (t.subtasks||[]))
          if (s.deadline && s.status !== 'klaar') out.push({t:s,p,c,parentTitle:t.title});
      }
  return out.sort((a,b) => a.t.deadline.localeCompare(b.t.deadline));
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const st = {
  catId: null, projId: null, view: 'project',
  openCats: new Set(),
  pinnedOpen: new Set(),
  pinnedExpanded: new Set(),
  collapsedProjs: new Set()
};

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render() { renderSidebar(); renderMain(); }

function renderSidebar() {
  document.getElementById('dl-nav').classList.toggle('active', st.view === 'deadlines');
  document.getElementById('sb-nav').innerHTML = db.categories.map(c => {
    const active = st.catId === c.id && st.view === 'project';
    const tn = (c.templates||[]).length;
    const np = c.projects.length;
    return `<div class="cat-wrap">
      <div class="cat-row ${active?'cat-active':''}" onclick="selectCat('${c.id}')">
        <span class="cat-name">${esc(c.name)}</span>
        ${np?`<span style="font-size:10px;color:rgba(255,255,255,.35);margin-left:auto;margin-right:4px;">${np}</span>`:''}
        <span class="cat-acts">
          <button class="ic-btn" onclick="event.stopPropagation();manageTemplates('${c.id}')" title="Sjablonen (${tn})">📄${tn?`<b style="font-size:9px">${tn}</b>`:''}</button>
          <button class="ic-btn" onclick="event.stopPropagation();addProject('${c.id}')" title="Nieuw project">+</button>
          <button class="ic-btn" onclick="event.stopPropagation();renameCategory('${c.id}')" title="Hernoem">✏</button>
          <button class="ic-btn" onclick="event.stopPropagation();deleteCategory('${c.id}')" title="Verwijder">✕</button>
        </span>
      </div>
    </div>`;
  }).join('');
}

function renderMain() {
  const m = document.getElementById('main');
  if (st.view === 'deadlines') { renderDeadlines(m); return; }
  if (!st.catId) {
    m.innerHTML = `<div class="empty-state">
      <div class="es-icon">📁</div><div class="es-title">Geen categorie geselecteerd</div>
      <div class="es-sub">Kies een categorie in de zijbalk of maak er een aan.</div>
    </div>`; return;
  }
  const cat = getCat(st.catId);
  if (!cat) { st.catId = null; renderMain(); return; }

  m.innerHTML = `
    <div class="main-header">
      <div class="mh-info">
        <span class="mh-title">${esc(cat.name)}</span><span class="mh-sep"> — </span><span class="mh-sub">${cat.projects.length} project${cat.projects.length!==1?'en':''}</span>
      </div>
      <div class="mh-acts">
        <button class="btn btn-primary" onclick="addProject('${cat.id}')">+ Nieuw project</button>
      </div>
    </div>
    <div class="cat-projects" id="cat-projects">
      ${cat.projects.length
        ? cat.projects.map(p => renderProjectBlock(cat, p)).join('')
        : `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);padding:60px 0;">
            <div style="font-size:44px;opacity:.2;">📂</div>
            <div style="font-size:15px;font-weight:600;">Geen projecten</div>
            <div style="font-size:13px;">Klik "+ Nieuw project" om te beginnen.</div>
          </div>`}
    </div>`;

  cat.projects.forEach(p => { if (!st.collapsedProjs.has(p.id)) attachDrag(p); });
  requestAnimationFrame(() => {
    drawCrossProjectArrows(cat);
    cat.projects.forEach(p => { if (!st.collapsedProjs.has(p.id)) drawIntraProjectArrows(p); });
  });
  window.onresize = () => {
    drawCrossProjectArrows(getCat(st.catId));
    getCat(st.catId)?.projects.forEach(p => drawIntraProjectArrows(p));
  };
}

// Pinned note — collapsible (voor enkelvoudige projectweergave)
function renderPinned(proj) {
  const isOpen = st.pinnedOpen.has(proj.id);
  const isExpanded = st.pinnedExpanded.has(proj.id);
  if (!isOpen) return '';
  const firstLine = proj.pinnedNote ? proj.pinnedNote.split('\n')[0] : '';
  if (!isExpanded) {
    return `<div class="pinned-bar">
      <span class="pinned-rot" onclick="togglePinned('${proj.id}')" title="Uitklappen">▶</span>
      <span style="font-size:15px;cursor:pointer;flex-shrink:0;" onclick="editPinnedNote()" title="Notitie bewerken">🗒</span>
      <span class="pinned-preview">${proj.pinnedNote ? esc(firstLine) : '<em style="color:#c8b050;">Nog geen notitie</em>'}</span>
    </div>`;
  }
  return `<div class="pinned-full">
    <div class="pinned-full-head">
      <span class="pinned-rot is-open" onclick="togglePinned('${proj.id}')" title="Inklappen">▶</span>
      <span style="font-size:15px;cursor:pointer;flex-shrink:0;" onclick="editPinnedNote()" title="Notitie bewerken">🗒</span>
      <span style="flex:1;font-size:12px;color:#8a7000;font-weight:600;padding-left:6px;">${esc(firstLine)}</span>
      <span style="cursor:pointer;color:#b8a030;padding:2px 8px;font-size:14px;" onclick="togglePinnedCollapse('${proj.id}')" title="Inklappen naar eerste regel">—</span>
    </div>
    <div class="pinned-full-body">
      <div class="pinned-text">${proj.pinnedNote ? renderMarkup(proj.pinnedNote) : ''}</div>
    </div>
  </div>`;
}
// Notitie pijltje in titelbalk: verborgen → ingeklapt → verborgen (overslaat uitgeklapt)
function togglePinnedFromHead(pid) {
  const proj = getProj(st.catId, pid); if (!proj) return;
  if (st.pinnedOpen.has(pid)) {
    // Was open (ingeklapt of uitgeklapt) → verbergen
    st.pinnedOpen.delete(pid);
    st.pinnedExpanded.delete(pid);
  } else {
    // Was verborgen → ingeklapt tonen
    st.pinnedOpen.add(pid);
    st.pinnedExpanded.delete(pid);
    // Als er nog geen notitie is, direct bewerkscherm openen
    if (!proj.pinnedNote) { renderMain(); editPinnedNote(); return; }
  }
  renderMain();
}
// Streepje rechts in notitie: uitgeklapt → ingeklapt (eerste regel)
function togglePinnedCollapse(pid) {
  st.pinnedExpanded.delete(pid);
  renderMain();
}
// Pijltje in notitie balk zelf: ingeklapt → uitgeklapt → ingeklapt
function togglePinned(pid) {
  if (st.pinnedExpanded.has(pid)) {
    st.pinnedExpanded.delete(pid);
  } else {
    st.pinnedExpanded.add(pid);
  }
  renderMain();
}

function renderTimeline(proj) {
  const tasks = [...proj.tasks].sort((a,b) => a.position - b.position);
  if (!tasks.length) return `<div class="tl-empty">Geen taken — klik op "+ Taak" om te beginnen.</div>`;
  let html = '';
  tasks.forEach(t => {
    html += cardWrapperHtml(t, proj);
  });
  return html;
}

// (#8) Card wrapper — haupttaak met uitklapbare subtakenrij
function cardWrapperHtml(task, proj) {
  const hasSubs = (task.subtasks||[]).length > 0;
  const expanded = task.isExpanded && hasSubs;
  let subRow = '';
  if (expanded) {
    const subs = [...task.subtasks].sort((a,b) => a.position - b.position);
    let subCards = '';
    subs.forEach(s => {
      subCards += cardHtml(s, proj, task);
    });
    subRow = `<div class="subtask-row">
      <div class="tl-sub" id="tl-sub-${task.id}">${subCards}</div>
      <div style="padding-left:10px;align-self:center;">
        <div class="add-card" style="width:110px;height:56px;font-size:11px;" onclick="st.projId='${proj.id}';openNewSubtask('${task.id}')">+ Subtaak</div>
      </div>
    </div>`;
  }
  return `<div class="card-wrapper">${cardHtml(task, proj, null)}${subRow}</div>`;
}

// Zoek een taak op id in alle projecten van alle categorieën
function findTaskAnywhere(id) {
  for (const c of db.categories)
    for (const p of c.projects) {
      const t = findInProj(p, id);
      if (t) return t;
    }
  return null;
}

// Effective status: check requiredTasks in eigen project én cross-project
function effectiveStatus(task, proj) {
  if (task.status === 'klaar') return 'klaar';
  if (task.requiredTasks?.length) {
    const allDone = task.requiredTasks.every(id => {
      const t = findInProj(proj, id) || findTaskAnywhere(id);
      return t?.status === 'klaar';
    });
    if (!allDone) return 'geblokkeerd';
  }
  return task.status;
}

// parentTask = null for main tasks, task object for subtasks
function cardHtml(task, proj, parentTask) {
  const isSub = parentTask !== null;
  const status = effectiveStatus(task, proj);
  const isKlaar = status === 'klaar';
  const isBlocked = status === 'geblokkeerd';
  const hasSubs = !isSub && (task.subtasks||[]).length > 0;
  const expanded = hasSubs && task.isExpanded;
  const subCls = isSub ? ' sub-card' : '';
  const isPinned = !isSub && task.position === 0 && proj.tasks.length > 1;

  // (#3) deadline chip — only dot, no border override on card
  let dlChip = '';
  if (task.deadline) {
    const dc = dlClass(task.deadline);
    let dot = '';
    if (dc === 'urgent') dot = '<span class="dl-dot dl-dot-urgent"></span>';
    else if (dc === 'soon') dot = '<span class="dl-dot dl-dot-soon"></span>';
    dlChip = `<div class="dl-chip">${dot}📅 ${fmtDate(task.deadline)}</div>`;
  }

  const ctx = `st.projId='${proj.id}';`;
  const pinFn = isSub ? `${ctx}togglePin('${task.id}','${parentTask.id}')` : `${ctx}togglePin('${task.id}',null)`;
  const isDepPinned = task.depPinned === true;  // vastgepind door pijlverbinding
  const pinIcon = isDepPinned ? '🔵' : '📌';
  const pinTitle = isDepPinned ? 'Vastgezet door verbinding — klik om positie vrij te geven' : (task.pinned ? 'Losmaken' : 'Vastzetten');
  const pinBtn = `<button class="pin-btn${(task.pinned||isDepPinned)?' is-pinned':''}" onclick="event.stopPropagation();${pinFn}" title="${pinTitle}">${pinIcon}</button>`;

  if (isKlaar) {
    const subToggle = hasSubs ? `<div class="subtask-toggle" onclick="toggleExpand('${task.id}','${proj.id}')">
      ${expanded?'▼':'▶'} ${task.subtasks.length} subtaak${task.subtasks.length!==1?'en':''}
    </div>` : '';
    const editFn = isSub ? `${ctx}openEditSubtask('${task.id}','${parentTask.id}')` : `${ctx}openEditTask('${task.id}')`;
    return `<div class="card c-klaar${subCls}" data-tid="${task.id}" ${isSub?`data-parent="${parentTask.id}"`:(!task.pinned && !task.depPinned?'draggable="true"':'')}>
      ${pinBtn}
      ${!isSub && !task.pinned && !task.depPinned?'<span class="drag-hdl">⠿</span>':''}
      <div class="card-head ch-klaar">
        <span class="badge b-klaar">✓ Afgerond</span>
        <div class="card-title">${esc(task.title)}</div>
      </div>
      ${task.outcome?`<div class="card-outcome">"${esc(task.outcome)}"</div>`:''}
      ${dlChip?`<div style="padding:0 14px 4px">${dlChip}</div>`:''}
      <div class="card-acts"><button class="ca-btn ca-edit" onclick="${editFn}">Bekijken</button></div>
      ${subToggle}
    </div>`;
  }

  const statusLabels = {actief:'Actief', wacht:'Wacht op antwoord', geblokkeerd:'Geblokkeerd'};

  let linksHtml = '';
  if (task.links?.length) {
    linksHtml = `<div class="card-links">`+
      task.links.map(l=>`<a class="lnk-btn" href="${esc(l.url)}" target="_blank" rel="noopener">🔗 ${esc(l.label||l.url)}</a>`).join('')+
    `</div>`;
  }
  if (task.outlookLink) {
    linksHtml += `<div class="card-links"><a class="lnk-btn lnk-outlook" href="${esc(task.outlookLink)}" title="Werkt alleen met Outlook als desktopapplicatie">📧 Outlook</a></div>`;
  }

  let folderHtml = '';
  if (task.folderPath) {
    folderHtml = `<div class="folder-row">📁 <span class="folder-path">${esc(task.folderPath)}</span>
      <button class="copy-btn" data-path="${esc(task.folderPath)}" onclick="copyPath(this)" title="Klik om het pad te kopiëren, plak het daarna in Verkenner">📋</button>
    </div>`;
  }

  let logHtml = '';
  if (task.logEntries?.length) {
    const last = task.logEntries[task.logEntries.length-1];
    logHtml = `<div class="log-latest">📝 <span style="font-weight:600">${esc(last.timestamp)}</span> ${renderMarkup(last.text)}</div>`;
  }

  let blockedOver = '';
  if (isBlocked) {
    const stillBlocked = (task.requiredTasks||[]).filter(id => {
      const t = findInProj(proj, id) || findTaskAnywhere(id);
      return t && t.status !== 'klaar';
    });
    // Splits in eigen project en cross-project
    const ownLabels = stillBlocked
      .filter(id => findInProj(proj, id))
      .map(id => esc(findInProj(proj, id).title));
    const crossLabels = stillBlocked
      .filter(id => !findInProj(proj, id))
      .map(id => {
        const t = findTaskAnywhere(id);
        return t ? `↕ ${esc(t.title)}` : null;
      }).filter(Boolean);
    const allLabels = [...ownLabels, ...crossLabels];
    blockedOver = `<div class="blocked-over">
      <span class="lock-ico">🔒</span>
      ${allLabels.length ? `<span class="block-lbl">${allLabels.join(' · ')}</span>` : ''}
    </div>`;
  }

  const subToggle = hasSubs ? `<div class="subtask-toggle" onclick="toggleExpand('${task.id}','${proj.id}')">
    ${expanded?'▼':'▶'} ${task.subtasks.length} subtaak${task.subtasks.length!==1?'en':''}
  </div>` : '';

  const editFn  = isSub ? `${ctx}openEditSubtask('${task.id}','${parentTask.id}')` : `${ctx}openEditTask('${task.id}')`;
  const logFn   = isSub ? `${ctx}quickLog('${task.id}','${parentTask.id}')` : `${ctx}quickLog('${task.id}',null)`;
  const doneFn  = isSub ? `${ctx}completeAny('${task.id}','${parentTask.id}')` : `${ctx}completeAny('${task.id}',null)`;

  return `<div class="card c-${status}${subCls}" data-tid="${task.id}" ${isSub?`data-parent="${parentTask.id}"`:(!task.pinned && !task.depPinned?'draggable="true"':'')}>
    ${pinBtn}
    ${!isSub && !task.pinned && !task.depPinned?'<span class="drag-hdl">⠿</span>':''}
    <div class="card-head ch-${status}">
      <span class="badge b-${status}">${statusLabels[status]||status}</span>
      <div class="card-title">${esc(task.title)}</div>
    </div>
    <div class="card-body">
      ${task.description?`<div class="card-desc">${renderMarkup(task.description)}</div>`:''}
      ${dlChip}${linksHtml}${folderHtml}${logHtml}
      ${blockedOver}

    <div class="card-acts">
      <button class="ca-btn ca-edit" onclick="${editFn}">✏ Bewerken</button>
      <button class="ca-btn ca-log" onclick="${logFn}">📝 Log</button>
      ${!isBlocked?`<button class="ca-btn ca-done" onclick="${doneFn}">✓ Afronden</button>`:''}
    </div>

  </div>`;
}

function renderDeadlines(m) {

  let rows = items.length ? '' : `<div style="color:var(--muted);font-size:14px;padding:20px 0;">Geen taken met deadlines gevonden.</div>`;

function renderProjectBlock(cat, proj) {
  const collapsed = st.collapsedProjs.has(proj.id);
  const crossDeps = getCrossProjectDeps(cat).filter(d =>
    d.fromProjId === proj.id || d.toProjId === proj.id
  );

  let body = '';
  if (!collapsed) {
    body = `<div class="proj-block-body">
      ${renderPinnedBlock(proj, cat.id)}
      <div class="proj-tl-area" id="pta-${proj.id}">
        <div class="tl" id="tl-${proj.id}">${renderTimeline(proj)}</div>
      </div>
    </div>`;
  } else if (crossDeps.length) {
    const names = [...new Set(crossDeps.map(d =>
      d.fromProjId === proj.id ? d.toProjId : d.fromProjId
    ))].map(pid => {
      const p = cat.projects.find(x => x.id === pid);
      return p ? esc(p.name) : '?';
    }).join(', ');
    body = `<div class="proj-collapsed-info">
      <span class="cross-proj-indicator">↕ Verbonden met: ${names}</span>
    </div>`;
  }

  const noteOpen = st.pinnedOpen.has(proj.id);
  return `<div class="proj-block ${collapsed?'is-collapsed':''}" id="pb-${proj.id}">
    <div class="proj-block-head">
      <span class="pbh-toggle" onclick="toggleProjCollapse('${proj.id}')" title="Project in/uitklappen">▶</span>
      <span class="note-toggle${noteOpen?' is-open':''}" onclick="st.catId='${cat.id}';st.projId='${proj.id}';togglePinnedFromHead('${proj.id}')" title="Notitie tonen/verbergen">▶</span>
      <div class="pbh-info">
        <span class="pbh-name">${esc(proj.name)}</span>${proj.description?`<span class="mh-sep"> — </span><span class="pbh-desc">${esc(proj.description)}</span>`:''}
      </div>
      <div class="pbh-acts">
        <button class="btn btn-secondary" style="font-size:11px;padding:4px 9px;" onclick="pinAll('${cat.id}','${proj.id}',true)" title="Alles pinnen">📌+</button>
        <button class="btn btn-secondary" style="font-size:11px;padding:4px 9px;" onclick="pinAll('${cat.id}','${proj.id}',false)" title="Alles losmaken">📌−</button>
        <button class="btn btn-secondary" style="font-size:11px;padding:4px 9px;" onclick="st.catId='${cat.id}';st.projId='${proj.id}';editProjectMeta()">⚙</button>
        <button class="btn btn-primary"   style="font-size:11px;padding:4px 9px;" onclick="st.catId='${cat.id}';st.projId='${proj.id}';openNewTask()">+ Taak</button>
      </div>
    </div>
    ${body}
  </div>`;
}

function renderPinnedBlock(proj, catId) {
  const isOpen = st.pinnedOpen.has(proj.id);
  const isExpanded = st.pinnedExpanded.has(proj.id);
  const ctx = `st.catId='${catId}';st.projId='${proj.id}';`;
  if (!isOpen) return '';
  const firstLine = proj.pinnedNote ? proj.pinnedNote.split('\n')[0] : '';
  if (!isExpanded) {
    // Ingeklapt: eerste regel zichtbaar + 🗒 links + roterende pijl + streepje rechts
    return `<div class="pinned-bar">
      <span class="pinned-rot" onclick="togglePinned('${proj.id}')" title="Uitklappen">▶</span>
      <span style="font-size:15px;cursor:pointer;flex-shrink:0;" onclick="${ctx}editPinnedNote()" title="Notitie bewerken">🗒</span>
      <span class="pinned-preview">${proj.pinnedNote ? esc(firstLine) : '<em style="color:#c8b050;">Nog geen notitie — klik op 🗒 om toe te voegen</em>'}</span>
    </div>`;
  }
  // Uitgeklapt: volledige tekst + 🗒 links + roterende pijl + streepje rechts (inklappen)
  return `<div class="pinned-full">
    <div class="pinned-full-head">
      <span class="pinned-rot is-open" onclick="togglePinned('${proj.id}')" title="Inklappen naar eerste regel">▶</span>
      <span style="font-size:15px;cursor:pointer;flex-shrink:0;" onclick="${ctx}editPinnedNote()" title="Notitie bewerken">🗒</span>
      <span style="flex:1;font-size:12px;color:#8a7000;font-weight:600;padding-left:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(firstLine)}</span>
      <span style="cursor:pointer;color:#b8a030;padding:2px 8px;font-size:14px;flex-shrink:0;" onclick="togglePinnedCollapse('${proj.id}')" title="Inklappen naar eerste regel">—</span>
    </div>
    <div class="pinned-full-body">
      <div class="pinned-text">${proj.pinnedNote ? renderMarkup(proj.pinnedNote) : ''}</div>
    </div>
  </div>`;
}

function toggleProjCollapse(projId) {
  if (st.collapsedProjs.has(projId)) st.collapsedProjs.delete(projId);
  else st.collapsedProjs.add(projId);
  const cat = getCat(st.catId); if (!cat) return;
  const proj = cat.projects.find(p => p.id === projId); if (!proj) return;
  const block = document.getElementById('pb-'+projId); if (!block) { renderMain(); return; }
  const tmp = document.createElement('div');
  tmp.innerHTML = renderProjectBlock(cat, proj);
  block.replaceWith(tmp.firstElementChild);
  if (!st.collapsedProjs.has(projId)) attachDrag(proj);
  requestAnimationFrame(() => {
    drawCrossProjectArrows(cat);
    if (!st.collapsedProjs.has(projId)) drawIntraProjectArrows(proj);
  });
}

function getCrossProjectDeps(cat) {
  const taskToProj = {};
  for (const p of cat.projects) {
    for (const t of p.tasks) {
      taskToProj[t.id] = p.id;
      for (const s of (t.subtasks||[])) taskToProj[s.id] = p.id;
    }
  }
  const result = [];
  for (const p of cat.projects) {
    const check = (taskId, deps) => {
      for (const rid of (deps||[])) {
        const tpid = taskToProj[rid];
        if (tpid && tpid !== p.id) {
          // Alleen tekenen als de vereiste taak nog niet klaar is
          const reqTask = findTaskAnywhere(rid);
          if (reqTask && reqTask.status === 'klaar') continue;
          result.push({fromProjId:p.id, fromTaskId:taskId, toProjId:tpid, toTaskId:rid});
        }
      }
    };
    for (const t of p.tasks) {
      check(t.id, t.requiredTasks);
      for (const s of (t.subtasks||[])) check(s.id, s.requiredTasks);
    }
  }
  return result;
}

function drawCrossProjectArrows(cat) {
  const container = document.getElementById('cat-projects'); if (!container) return;
  const existing = document.getElementById('cross-arrows-svg'); if (existing) existing.remove();

  const cr = container.getBoundingClientRect();
  const sx = container.scrollLeft;
  const sy = container.scrollTop;

  // Blokkerende horizontale banden: projecttitelbalken en gele notitiebalken
  const bands = [];
  container.querySelectorAll('.proj-block-head, .pinned-bar, .pinned-full').forEach(el => {
    const r = el.getBoundingClientRect();
    bands.push([r.top - cr.top + sy, r.bottom - cr.top + sy, false]);
  });

  // Licht-overlappende zones: kaartjes (lijn loopt er doorheen maar wordt lichter)
  const dimZones = [];
  container.querySelectorAll('.card').forEach(el => {
    const r = el.getBoundingClientRect();
    dimZones.push([r.top - cr.top + sy, r.bottom - cr.top + sy]);
  });

  const lineEls = [];
  const deps = getCrossProjectDeps(cat);

  for (const dep of deps) {
    const fromEl = container.querySelector(`[data-tid="${dep.fromTaskId}"]`);
    const toEl   = container.querySelector(`[data-tid="${dep.toTaskId}"]`);
    if (!fromEl || !toEl) continue;
    const fr = fromEl.getBoundingClientRect();
    const tr = toEl.getBoundingClientRect();

    // Richting afhankelijk van positie doel t.o.v. bron
    const goingDown = tr.top >= fr.bottom;
    const x1 = fr.left + fr.width / 2 - cr.left + sx;
    const y1 = goingDown ? fr.bottom - cr.top + sy : fr.top - cr.top + sy;
    const x2 = tr.left + tr.width / 2 - cr.left + sx;
    const y2 = goingDown ? tr.top - cr.top + sy : tr.bottom - cr.top + sy;

    const dy = y2 - y1;

    // Bereken welke delen van de lijn [t=0..1] geblokkeerd worden door balken
    const gaps = [];
    if (Math.abs(dy) > 0.5) {
      for (const [yTop, yBot] of bands) {
        const t0 = (yTop - y1) / dy;
        const t1 = (yBot - y1) / dy;
        const te = Math.min(t0, t1);
        const tx = Math.max(t0, t1);
        if (tx > 0.001 && te < 0.999) {
          gaps.push([Math.max(0, te), Math.min(1, tx)]);
        }
      }
    }

    gaps.sort((a, b) => a[0] - b[0]);
    const merged = [];
    for (const g of gaps) {
      if (merged.length && g[0] <= merged[merged.length - 1][1]) {
        merged[merged.length - 1][1] = Math.max(merged[merged.length - 1][1], g[1]);
      } else {
        merged.push([...g]);
      }
    }

    const segs = [];
    let tCur = 0;
    for (const [te, tx] of merged) {
      if (te > tCur + 0.001) segs.push([tCur, te]);
      tCur = tx;
    }
    if (tCur < 0.999) segs.push([tCur, 1]);
    if (!segs.length) continue;

    segs.forEach(([ta, tb], i) => {
      const xa = (x1 + ta * (x2 - x1)).toFixed(1);
      const ya = (y1 + ta * (y2 - y1)).toFixed(1);
      const xb = (x1 + tb * (x2 - x1)).toFixed(1);
      const yb = (y1 + tb * (y2 - y1)).toFixed(1);
      // Check of dit segment door een kaartje loopt — zo ja, lichter tonen
      const segMidY = (y1 + ((ta+tb)/2) * (y2 - y1));
      const isDimmed = dimZones.some(([zt, zb]) => segMidY >= zt && segMidY <= zb);
      const opacity = isDimmed ? '0.25' : '1';
      lineEls.push(`<line x1="${xa}" y1="${ya}" x2="${xb}" y2="${yb}" stroke="#94a3b8" stroke-width="2" opacity="${opacity}"${i === segs.length - 1 ? ' marker-end="url(#cpa)"' : ''}/>`);
    });
  }

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.id = 'cross-arrows-svg';
  svg.style.cssText = `position:absolute;top:0;left:0;width:${container.scrollWidth}px;height:${container.scrollHeight}px;pointer-events:none;z-index:0;overflow:visible;`;
  svg.innerHTML = `<defs>
    <marker id="cpa" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#94a3b8"/>
    </marker>
  </defs>${lineEls.join('')}`;
  container.appendChild(svg);

  container.onscroll = () => drawCrossProjectArrows(cat);
  document.querySelectorAll('.proj-tl-area').forEach(el => el.onscroll = () => drawCrossProjectArrows(cat));
}

// ── BINNEN-PROJECT BOGEN ────────────────────────────────
function drawIntraProjectArrows(proj) {
  const tlEl = document.getElementById('tl-'+proj.id);
  if (!tlEl) return;

  // Verwijder bestaande SVG voor dit project
  const existId = 'intra-svg-'+proj.id;
  const existing = document.getElementById(existId);
  if (existing) existing.remove();

  const paths = [];
  const tasks = [...proj.tasks].sort((a,b) => a.position - b.position);

  for (const task of tasks) {
    if (!task.requiredTasks?.length) continue;
    const toEl = tlEl.querySelector(`[data-tid="${task.id}"]`);
    if (!toEl) continue;
    const toRect = toEl.getBoundingClientRect();
    const tlRect = tlEl.getBoundingClientRect();

    for (const reqId of task.requiredTasks) {
      // Alleen binnen-project dependencies die nog niet klaar zijn
      const reqTask = findInProj(proj, reqId);
      if (!reqTask) continue;
      if (reqTask.status === 'klaar') continue; // dependency opgelost → geen boog
      const fromEl = tlEl.querySelector(`[data-tid="${reqId}"]`);
      if (!fromEl) continue;
      const fromRect = fromEl.getBoundingClientRect();

      // Coördinaten relatief aan tlEl — bovenkant van elk kaartje, horizontaal gecentreerd
      const x1 = fromRect.left + fromRect.width / 2 - tlRect.left + tlEl.scrollLeft;
      const x2 = toRect.left + toRect.width / 2 - tlRect.left + tlEl.scrollLeft;
      const y1 = fromRect.top - tlRect.top + tlEl.scrollTop;
      const y2 = toRect.top - tlRect.top + tlEl.scrollTop;

      // Hoogte van de boog: minimaal 40px boven het hoogste kaartje
      const arcTop = Math.min(y1, y2) - 40;

      paths.push(`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} C${x1.toFixed(1)},${arcTop.toFixed(1)} ${x2.toFixed(1)},${arcTop.toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}"
        fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#ipa-${proj.id})"/>`);
    }
  }

  if (!paths.length) return;

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.id = existId;
  svg.style.cssText = `position:absolute;top:0;left:0;width:${tlEl.scrollWidth}px;height:${tlEl.scrollHeight + 50}px;pointer-events:none;z-index:0;overflow:visible;`;
  svg.innerHTML = `<defs>
    <marker id="ipa-${proj.id}" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#94a3b8"/>
    </marker>
  </defs>${paths.join('')}`;

  // tlEl moet position:relative hebben
  tlEl.style.position = 'relative';
  tlEl.appendChild(svg);

  tlEl.onscroll = () => drawIntraProjectArrows(proj);
}

// ═══════════════════════════════════════════════════════
// DRAG & DROP (main tasks + subtasks) (#8)
// ═══════════════════════════════════════════════════════
let dragId = null, dragParentId = null;

function attachDrag(proj) {
  // Main-task cards (draggable, only non-pinned)
  document.querySelectorAll(`#tl-${proj.id} > .card-wrapper > .card[draggable="true"]`).forEach(card => {
    const tid = card.dataset.tid;
    const task = getTask(proj, tid);
    if (!task) return;
    card.addEventListener('dragstart', e => {
      dragId = tid; dragParentId = null;
      card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging','drag-over'));
    card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault(); card.classList.remove('drag-over');
      if (dragId && dragId !== tid && dragParentId === null) {
        pushUndo();
        const a = getTask(proj, dragId), b = getTask(proj, tid);
        if (a && b) { [a.position, b.position] = [b.position, a.position]; save(); renderMain(); }
      }
    });
  });

  // Subtask cards (draggable within same parent)
  proj.tasks.forEach(task => {
    if (!task.isExpanded || !task.subtasks?.length) return;
    const subTl = document.getElementById('tl-sub-'+task.id);
    if (!subTl) return;
    subTl.querySelectorAll('.card').forEach(card => {
      const sid = card.dataset.tid;
      const pid = card.dataset.parent;
      card.setAttribute('draggable', 'true');
      card.addEventListener('dragstart', e => {
        dragId = sid; dragParentId = pid;
        card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => card.classList.remove('dragging','drag-over'));
      card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
      card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
      card.addEventListener('drop', e => {
        e.preventDefault(); card.classList.remove('drag-over');
        if (dragId && dragId !== sid && dragParentId === pid) {
          pushUndo();
          const parentT = getTask(proj, pid);
          if (!parentT) return;
          const a = parentT.subtasks.find(s => s.id === dragId);
          const b = parentT.subtasks.find(s => s.id === sid);
          if (a && b) { [a.position, b.position] = [b.position, a.position]; save(); renderMain(); }
        }
      });
    });
  });
}

function toggleExpand(taskId, projId) {
  const r = findProjById(projId); if (!r) return;
  const task = getTask(r.proj, taskId); if (!task) return;
  pushUndo();
  task.isExpanded = !task.isExpanded;
  save(); renderMain();
}

function editProjectMeta() {
  const proj = getProj(st.catId,st.projId); if (!proj) return;
  openModal('Project bewerken',`
    <div class="fg"><label>Naam</label><input class="fc" id="pn" value="${esc(proj.name)}"></div>
    <div class="fg"><label>Omschrijving</label><textarea class="fc" id="pd">${esc(proj.description)}</textarea></div>
    <div class="fg"><label>Vastgezette notitie</label>${fmtToolbar('pp')}<textarea class="fc" id="pp" rows="4" onkeydown="fmtKey(event,this)">${esc(proj.pinnedNote)}</textarea></div>
  `,() => {
    const n = document.getElementById('pn').value.trim();
    if (!n) { alert('Vul een naam in.'); return false; }
    pushUndo(); proj.name=n; proj.description=document.getElementById('pd').value.trim();
    proj.pinnedNote=document.getElementById('pp').value.trim(); save(); render(); return true;
  });
}
function editPinnedNote() {
  const proj = getProj(st.catId,st.projId); if (!proj) return;
  openModalStrict('Vastgezette notitie',`
    <div class="fg"><label>Notitie (altijd zichtbaar bovenaan)</label>
      ${fmtToolbar('pn-val')}
      <textarea class="fc" id="pn-val" rows="6" onkeydown="fmtKey(event,this)">${esc(proj.pinnedNote)}</textarea></div>
  `,() => {
